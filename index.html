<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transport Scolaire — ETS85-AIZ-C05</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;--accent:#f0a500;--accent2:#3fb950;--text:#e6edf3;--muted:#8b949e;--danger:#f85149;--blue:#58a6ff;--morning:#f0a500;--evening:#58a6ff;--occasional:#c084fc;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:0 0 80px;}

header{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;}
.bus-icon{font-size:20px;background:var(--accent);width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.header-info{flex:1;min-width:0;}
header h1{font-family:'Syne',sans-serif;font-weight:800;font-size:15px;}
header p{font-size:10px;color:var(--muted);}
.save-indicator{font-size:10px;color:var(--accent2);}

/* WEEK NAV */
.week-nav{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 12px;display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;}
.week-nav::-webkit-scrollbar{display:none;}
.day-btn{flex-shrink:0;padding:7px 10px;border-radius:10px;border:1px solid var(--border);background:none;color:var(--muted);font-family:'Syne',sans-serif;font-weight:700;font-size:11px;cursor:pointer;text-align:center;min-width:52px;transition:all .2s;}
.day-btn .day-name{display:block;font-size:10px;margin-bottom:2px;}
.day-btn .day-num{display:block;font-size:15px;}
.day-btn.today{border-color:var(--accent);color:var(--accent);}
.day-btn.active{background:var(--accent);color:#000;border-color:var(--accent);}
.day-btn.has-changes::after{content:'•';color:var(--occasional);font-size:8px;display:block;margin-top:1px;}
.day-btn.weekend{opacity:0.35;}

.container{max-width:960px;margin:0 auto;padding:14px 12px;}
.stats-bar{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:8px 12px;flex:1;min-width:72px;}
.stat-num{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--accent);}
.stat-label{font-size:10px;color:var(--muted);margin-top:1px;}

.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:6px;flex-wrap:wrap;}
.btn-group{display:flex;gap:5px;flex-wrap:wrap;}
.btn{border:none;border-radius:8px;padding:7px 11px;font-family:'Syne',sans-serif;font-weight:700;font-size:11px;cursor:pointer;display:inline-flex;align-items:center;gap:4px;transition:all .2s;white-space:nowrap;}
.btn-primary{background:var(--accent);color:#000;}
.btn-blue{background:rgba(88,166,255,0.12);color:var(--blue);border:1px solid rgba(88,166,255,0.3);}
.btn-purple{background:rgba(192,132,252,0.12);color:var(--occasional);border:1px solid rgba(192,132,252,0.3);}
.btn-green{background:rgba(63,185,80,0.12);color:var(--accent2);border:1px solid rgba(63,185,80,0.3);}
.btn-red{background:rgba(248,81,73,0.12);color:var(--danger);border:1px solid rgba(248,81,73,0.3);}

.badge{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;}
.badge-morning{background:rgba(240,165,0,0.15);color:var(--morning);border:1px solid rgba(240,165,0,0.3);}
.badge-evening{background:rgba(88,166,255,0.15);color:var(--evening);border:1px solid rgba(88,166,255,0.3);}
.badge-occasional{background:rgba(192,132,252,0.15);color:var(--occasional);border:1px solid rgba(192,132,252,0.3);}

.route-block{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:16px;}
.route-block.occasional-block{border-color:rgba(192,132,252,0.35);}
.route-meta{padding:9px 13px;border-bottom:1px solid var(--border);display:flex;gap:10px;font-size:11px;color:var(--muted);background:var(--surface2);flex-wrap:wrap;align-items:center;}
.meta-time-edit{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:3px 6px;color:var(--text);font-size:12px;font-family:'Syne',sans-serif;font-weight:700;width:32px;text-align:center;}
.meta-time-edit:focus{outline:none;border-color:var(--accent);}

.cards-list{padding:7px;display:flex;flex-direction:column;gap:7px;}
.passenger-card{background:var(--surface2);border:1px solid var(--border);border-radius:11px;padding:11px 13px;display:flex;gap:10px;align-items:flex-start;}
.passenger-card.depot-card{background:rgba(88,166,255,0.04);border-color:rgba(88,166,255,0.2);}
.passenger-card.depart-card{background:rgba(63,185,80,0.04);border-color:rgba(63,185,80,0.2);}
.passenger-card.occasional-pass{background:rgba(192,132,252,0.04);border-color:rgba(192,132,252,0.15);}
.passenger-card.absent-card{opacity:0.4;background:rgba(248,81,73,0.04);border-color:rgba(248,81,73,0.15);text-decoration:line-through;}
.passenger-card.extra-card{background:rgba(63,185,80,0.04);border-color:rgba(63,185,80,0.2);}

.card-time{font-family:'Syne',sans-serif;font-weight:800;font-size:17px;min-width:50px;flex-shrink:0;padding-top:2px;}
.time-morning{color:var(--morning);}
.time-evening{color:var(--evening);}
.time-occasional{color:var(--occasional);}
.time-green{color:var(--accent2);}
.card-body{flex:1;min-width:0;}
.card-top{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:4px;}
.card-name{font-weight:600;font-size:13px;}
.card-address{font-size:11px;color:var(--muted);margin-bottom:2px;word-break:break-word;}
.card-note{font-size:10px;color:#6e7681;font-style:italic;}
.card-contact{font-size:10px;color:var(--muted);font-family:monospace;margin-top:3px;}
.card-actions{display:flex;flex-direction:column;gap:5px;flex-shrink:0;}
.icon-btn{background:none;border:1px solid var(--border);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.edit-btn:hover{background:rgba(240,165,0,0.12);border-color:rgba(240,165,0,0.4);}
.delete-btn:hover{background:rgba(248,81,73,0.1);border-color:rgba(248,81,73,0.4);}
.restore-btn{background:rgba(63,185,80,0.1);border-color:rgba(63,185,80,0.3);}

.type-badge{display:inline-flex;align-items:center;gap:2px;padding:2px 7px;border-radius:5px;font-size:10px;font-weight:600;}
.type-montee{background:rgba(63,185,80,0.1);color:var(--accent2);}
.type-descente{background:rgba(248,81,73,0.12);color:#ff7b72;}
.type-depot{background:rgba(88,166,255,0.1);color:var(--blue);}
.type-depart{background:rgba(63,185,80,0.1);color:var(--accent2);}
.type-extra{background:rgba(63,185,80,0.15);color:var(--accent2);}
.type-absent{background:rgba(248,81,73,0.12);color:var(--danger);}

.duration-info{font-size:11px;color:var(--muted);padding:7px 13px;border-top:1px solid var(--border);background:var(--surface2);display:flex;justify-content:space-between;flex-wrap:wrap;gap:5px;}
.empty-state{text-align:center;padding:24px;color:var(--muted);font-size:13px;}

.routing-banner{background:rgba(63,185,80,0.08);border:1px solid rgba(63,185,80,0.2);border-radius:8px;padding:9px 13px;font-size:12px;color:var(--accent2);margin-bottom:14px;display:flex;align-items:center;gap:7px;}
.routing-banner.loading{background:rgba(240,165,0,0.08);border-color:rgba(240,165,0,0.2);color:var(--accent);}
.routing-banner.error{background:rgba(248,81,73,0.08);border-color:rgba(248,81,73,0.2);color:var(--danger);}
.occasional-info{background:rgba(192,132,252,0.08);border:1px solid rgba(192,132,252,0.2);border-radius:8px;padding:9px 13px;font-size:12px;color:var(--occasional);margin-bottom:10px;}

/* MODALS */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.82);z-index:200;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:20px 20px 0 0;padding:12px 18px 36px;width:100%;max-width:540px;animation:slideUp .25s ease;max-height:94vh;overflow-y:auto;}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-handle{width:44px;height:5px;background:var(--border);border-radius:3px;margin:0 auto 16px;}
.modal h2{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;margin-bottom:14px;}
.form-group{margin-bottom:11px;position:relative;}
label{display:block;font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:500;text-transform:uppercase;letter-spacing:.4px;}
input,select,textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:11px 13px;color:var(--text);font-size:15px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .15s;-webkit-appearance:none;appearance:none;}
textarea{resize:vertical;min-height:56px;font-size:14px;}
input:focus,select:focus,textarea:focus{border-color:var(--accent);}
select option{background:var(--surface2);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.modal-actions{display:flex;gap:7px;margin-top:18px;}
.btn-cancel{flex:1;padding:12px;background:var(--surface2);border:1px solid var(--border);border-radius:11px;color:var(--text);font-size:14px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.btn-save{flex:2;padding:12px;background:var(--accent);border:none;border-radius:11px;color:#000;font-size:14px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif;}
.btn-save-purple{background:var(--occasional)!important;color:#000;}
.btn-save-green{background:var(--accent2)!important;color:#000;}

.time-inputs{display:flex;align-items:center;gap:6px;}
.time-inputs input{text-align:center;font-family:'Syne',sans-serif;font-weight:700;font-size:18px;padding:10px 6px;width:58px;}
.time-sep{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;color:var(--accent);}

.cp-row{display:grid;grid-template-columns:1fr 1.5fr;gap:9px;align-items:start;}
.cp-loading{font-size:10px;color:var(--muted);margin-top:3px;min-height:14px;}

/* AUTOCOMPLETE */
.ac-wrap{position:relative;}
.ac-list{position:absolute;top:100%;left:0;right:0;background:var(--surface);border:1px solid var(--accent);border-radius:10px;z-index:500;max-height:200px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,0.5);margin-top:3px;display:none;}
.ac-list.open{display:block;}
.ac-item{padding:10px 13px;cursor:pointer;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:2px;}
.ac-item:last-child{border-bottom:none;}
.ac-item:hover{background:rgba(240,165,0,0.1);}
.ac-name{font-weight:600;font-size:13px;}
.ac-detail{font-size:11px;color:var(--muted);}

.depot-item{display:flex;align-items:center;gap:9px;padding:11px 0;border-bottom:1px solid var(--border);}
.depot-item:last-child{border-bottom:none;}
.depot-checkbox{width:20px;height:20px;accent-color:var(--accent);cursor:pointer;flex-shrink:0;}
.depot-item-label{flex:1;font-size:13px;}
.depot-time-h,.depot-time-m{width:44px!important;padding:5px 3px!important;font-size:13px!important;text-align:center;flex-shrink:0;}
.section-divider{margin:14px 0 11px;padding-top:13px;border-top:1px solid var(--border);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);}

.spinner{display:inline-block;width:12px;height:12px;border:2px solid rgba(240,165,0,0.3);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

@media(min-width:700px){
  .modal-overlay{align-items:center;padding:16px;}
  .modal{border-radius:18px;padding:22px;}
  .modal-handle{display:none;}
}
</style>
</head>
<body>

<header>
  <div class="bus-icon">🚌</div>
  <div class="header-info">
    <h1>Transport Scolaire</h1>
    <p>ETS85-AIZ-C05</p>
  </div>
  <div class="save-indicator" id="saveIndicator">✓ Sauvegardé</div>
</header>

<!-- NAVIGATION SEMAINE -->
<div class="week-nav" id="weekNav"></div>

<div class="container">
  <div id="routingStatus"></div>
  <div class="stats-bar" id="statsBar"></div>

  <!-- MATIN -->
  <div class="section-header">
    <span class="badge badge-morning">☀️ MATIN</span>
    <div class="btn-group">
      <button class="btn btn-green" onclick="recalcWithRouting('morning')">🗺 Recalc.</button>
      <button class="btn btn-blue" onclick="openDepotModal('morning')">📍 Dépôts</button>
      <button class="btn btn-primary" onclick="openPassengerModal('morning')">+ Passager</button>
    </div>
  </div>
  <div class="route-block">
    <div class="route-meta" id="morningMeta"></div>
    <div class="cards-list" id="morningBody"></div>
    <div class="duration-info" id="morningDuration"></div>
  </div>

  <!-- SOIR -->
  <div class="section-header">
    <span class="badge badge-evening">🌙 SOIR</span>
    <div class="btn-group">
      <button class="btn btn-green" onclick="recalcWithRouting('evening')">🗺 Recalc.</button>
      <button class="btn btn-blue" onclick="openDepotModal('evening')">📍 Dépôts</button>
      <button class="btn btn-primary" onclick="openPassengerModal('evening')">+ Passager</button>
    </div>
  </div>
  <div class="route-block">
    <div class="route-meta" id="eveningMeta"></div>
    <div class="cards-list" id="eveningBody"></div>
    <div class="duration-info" id="eveningDuration"></div>
  </div>

  <!-- OCCASIONNEL -->
  <div class="section-header">
    <span class="badge badge-occasional">⚡ OCCASIONNEL</span>
    <div class="btn-group">
      <button class="btn btn-red" onclick="resetOccasional()" id="btnResetOcc" style="display:none">🗑 Effacer</button>
      <button class="btn btn-green" onclick="recalcWithRouting('occasional')" id="btnRecalcOcc" style="display:none">🗺 Recalc.</button>
      <button class="btn btn-blue" onclick="openDepotModal('occasional')" id="btnDepotOcc" style="display:none">📍 Dépôts</button>
      <button class="btn btn-purple" onclick="openPassengerModal('occasional')">+ Passager</button>
    </div>
  </div>
  <div class="occasional-info">⚡ Circuit ponctuel — spécifique à ce jour</div>
  <div class="route-block occasional-block" id="occasionalBlock" style="display:none">
    <div class="route-meta" id="occasionalMeta"></div>
    <div class="cards-list" id="occasionalBody"></div>
    <div class="duration-info" id="occasionalDuration"></div>
  </div>
</div>

<!-- MODAL PASSAGER -->
<div class="modal-overlay" id="modalPassager">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 id="modalPassagerTitle">➕ Nouveau passager</h2>
    <div class="form-group">
      <label>🔍 Rechercher dans le carnet</label>
      <div class="ac-wrap">
        <input type="text" id="pSearch" placeholder="Taper un nom…" autocomplete="off" oninput="searchContact(this.value)">
        <div class="ac-list" id="pSearchList"></div>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Nom</label><input type="text" id="pNom" placeholder="DUPONT" autocomplete="off"></div>
      <div class="form-group"><label>Prénom</label><input type="text" id="pPrenom" placeholder="Lucas" autocomplete="off"></div>
    </div>
    <div class="form-group"><label>Adresse (rue)</label>
      <div class="ac-wrap">
        <input type="text" id="pAdresse" placeholder="12 rue des Lilas" autocomplete="off" oninput="searchAddress(this.value,'pAdresseList','pCodePostal','pVille','pCpStatus')">
        <div class="ac-list" id="pAdresseList"></div>
      </div>
    </div>
    <div class="cp-row">
      <div class="form-group">
        <label>Code postal</label>
        <input type="text" id="pCodePostal" placeholder="85190" maxlength="5" inputmode="numeric" oninput="autoFillCity(this.value,'pVille','pCpStatus','pVilleList')">
        <div class="cp-loading" id="pCpStatus"></div>
      </div>
      <div class="form-group"><label>Ville (auto)</label>
        <div class="ac-wrap">
          <input type="text" id="pVille" placeholder="Rempli auto…" autocomplete="off" oninput="searchVille(this.value,'pVilleList')">
          <div class="ac-list" id="pVilleList"></div>
        </div>
      </div>
    </div>
    <div class="form-group"><label>Note / Repère</label><textarea id="pNote" placeholder="Portail bleu..."></textarea></div>
    <div class="form-row">
      <div class="form-group"><label>Lien</label><select id="pLien"><option>Mère</option><option>Père</option><option>Mobile</option><option>Tuteur</option></select></div>
      <div class="form-group"><label>Téléphone</label><input type="tel" id="pTel" placeholder="06 XX XX XX XX"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Type</label><select id="pType"><option value="Montée">Montée</option><option value="Descente">Descente</option></select></div>
      <div class="form-group"><label>Heure</label>
        <div class="time-inputs">
          <input type="text" id="pH" placeholder="07" maxlength="2" inputmode="numeric">
          <span class="time-sep">:</span>
          <input type="text" id="pM" placeholder="00" maxlength="2" inputmode="numeric">
        </div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closePassengerModal()">Annuler</button>
      <button class="btn-save" id="btnSavePassager" onclick="savePassenger()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- MODAL DÉPÔTS -->
<div class="modal-overlay" id="modalDepots">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 id="depotsTitle">📍 Gérer les dépôts</h2>
    <p style="font-size:12px;color:var(--muted);margin-bottom:12px">Cochez les dépôts actifs.</p>
    <div id="depotsList"></div>
    <div class="section-divider">Ajouter un établissement</div>
    <div class="form-row">
      <div class="form-group"><label>Nom</label><input type="text" id="dNom" placeholder="Lycée Colette"></div>
      <div class="form-group"><label>Heure</label>
        <div class="time-inputs">
          <input type="text" id="dH" placeholder="08" maxlength="2" inputmode="numeric">
          <span class="time-sep">:</span>
          <input type="text" id="dM" placeholder="35" maxlength="2" inputmode="numeric">
        </div>
      </div>
    </div>
    <div class="form-group"><label>Adresse (optionnel)</label><input type="text" id="dAdresse" placeholder="Aizenay"></div>
    <button class="btn btn-primary" style="width:100%;justify-content:center;padding:12px;font-size:13px;margin-top:4px" onclick="addDepot()">+ Ajouter</button>
    <div class="modal-actions" style="margin-top:12px"><button class="btn-cancel" onclick="closeDepotModal()">Fermer</button></div>
  </div>
</div>

<script>
const ORS_KEY='eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6ImI4MWRkNjZhYzMxODRjZDI5NjVlNmUwMTcwZmY2NzVmIiwiaCI6Im11cm11cjY0In0=';
const JOURS_COURT=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
const JOURS_LONG=['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
const MOIS=['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];

// ══════════════════════════════════════════
// SEMAINE — Navigation
// ══════════════════════════════════════════
let selectedDate=getTodayStr();

function getTodayStr(){return new Date().toISOString().split('T')[0];}

function getWeekDates(){
  // Lundi de la semaine contenant selectedDate
  const d=new Date(selectedDate+'T12:00:00');
  const day=d.getDay();
  const monday=new Date(d);
  monday.setDate(d.getDate()-(day===0?6:day-1));
  const dates=[];
  for(let i=0;i<7;i++){
    const dd=new Date(monday);
    dd.setDate(monday.getDate()+i);
    dates.push(dd.toISOString().split('T')[0]);
  }
  return dates;
}

function renderWeekNav(){
  const nav=document.getElementById('weekNav');
  const today=getTodayStr();
  const dates=getWeekDates();
  nav.innerHTML='';

  // Flèche semaine précédente
  const prev=document.createElement('button');
  prev.className='day-btn';prev.style.minWidth='30px';prev.textContent='‹';
  prev.onclick=()=>{const d=new Date(selectedDate+'T12:00:00');d.setDate(d.getDate()-7);selectedDate=d.toISOString().split('T')[0];renderWeekNav();render();};
  nav.appendChild(prev);

  dates.forEach(dateStr=>{
    const d=new Date(dateStr+'T12:00:00');
    const isWeekend=d.getDay()===0||d.getDay()===6;
    const btn=document.createElement('button');
    btn.className='day-btn'+(dateStr===today?' today':'')+(dateStr===selectedDate?' active':'')+(isWeekend?' weekend':'');
    btn.innerHTML=`<span class="day-name">${JOURS_COURT[d.getDay()]}</span><span class="day-num">${d.getDate()}</span>`;
    // Indicateur si ce jour a des modifications
    const dayData=getDayData(dateStr);
    if(dayData&&(dayData.morning.absents.length||dayData.morning.extras.length||dayData.evening.absents.length||dayData.evening.extras.length||(dayData.occasional&&dayData.occasional.passengers.length))){
      btn.classList.add('has-changes');
    }
    btn.onclick=()=>{selectedDate=dateStr;renderWeekNav();render();};
    nav.appendChild(btn);
  });

  // Flèche semaine suivante
  const next=document.createElement('button');
  next.className='day-btn';next.style.minWidth='30px';next.textContent='›';
  next.onclick=()=>{const d=new Date(selectedDate+'T12:00:00');d.setDate(d.getDate()+7);selectedDate=d.toISOString().split('T')[0];renderWeekNav();render();};
  nav.appendChild(next);
}

// Obtenir les données du jour (overrides sur la base)
function getDayData(dateStr){return days[dateStr]||null;}

function ensureDayData(dateStr,tournee){
  if(!days[dateStr])days[dateStr]={};
  if(!days[dateStr][tournee]){
    const b=base[tournee];
    days[dateStr][tournee]={
      depart:b.depart,
      arrivee:b.arrivee,
      departCircuit:b.departCircuit||null,
      departAdresse:b.departAdresse,
      departCP:b.departCP,
      departVille:b.departVille,
      absents:[],
      overrides:{},
      extras:[],
      depots:JSON.parse(JSON.stringify(b.depots))
    };
  }
  return days[dateStr][tournee];
}

function ensureOccasional(dateStr){
  if(!days[dateStr])days[dateStr]={};
  if(!days[dateStr].occasional){
    days[dateStr].occasional={depart:"08:00",arrivee:null,departAdresse:"",departCP:"",departVille:"",passengers:[],depots:[]};
  }
  return days[dateStr].occasional;
}

// Obtenir la tournée effective pour un jour = base + overrides
function getEffectiveTournee(dateStr,tournee){
  const b=base[tournee];
  const d=getDayData(dateStr);
  const ov=d?d[tournee]:null;
  const overrides=ov?ov.overrides||{}:{};
  // Appliquer les overrides du jour sur les passagers de base
  const passengers=b.passengers.map(p=>overrides[p.id]?{...p,...overrides[p.id],id:p.id}:p);
  return{
    depart:ov?ov.depart:b.depart,
    arrivee:ov?ov.arrivee:b.arrivee,
    departCircuit:ov?(ov.departCircuit||b.departCircuit||null):(b.departCircuit||null),
    departAdresse:ov?ov.departAdresse:b.departAdresse,
    departCP:ov?ov.departCP:b.departCP,
    departVille:ov?ov.departVille:b.departVille,
    passengers,
    absents:ov?ov.absents:[],
    extras:ov?ov.extras:[],
    depots:ov?ov.depots:b.depots
  };
}

function normalizeStr(s){return(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,'');}
function addOrUpdateCarnet(p){
  const key=normalizeStr(p.nom+p.prenom);
  const idx=carnet.findIndex(c=>normalizeStr(c.nom+c.prenom)===key);
  const e={nom:p.nom,prenom:p.prenom,adresse:p.adresse,codePostal:p.codePostal,ville:p.ville,lien:p.lien,tel:p.tel,note:p.note||''};
  if(idx>=0)carnet[idx]=e;else carnet.push(e);
}
function initCarnetFromBase(){
  if(carnet.length>0)return;
  ['morning','evening'].forEach(t=>base[t].passengers.forEach(p=>addOrUpdateCarnet(p)));
}
function searchContact(val){
  const list=document.getElementById('pSearchList');

  list._results=res;list.classList.add('open');
}
function fillFromCarnet(idx){
  const c=document.getElementById('pSearchList')._results[idx];

function searchAddress(val,listId,cpId,villeId,statusId){

function pickAddress(addr,listId,cpId,villeId,statusId){

function searchVille(val,listId){

// CP → VILLE (toutes les communes)
// ══════════════════════════════════════════
const cpCache={};let cpTimer=null;
async function autoFillCity(cp,villeId,statusId,listId){
  const status=document.getElementById(statusId),villeEl=document.getElementById(villeId);
  const acList=listId?document.getElementById(listId):null;
  cp=cp.replace(/\D/g,'');
  if(cp.length<5){status.textContent='';if(acList)acList.classList.remove('open');return;}
  if(cpCache[cp]){showCpResult(cpCache[cp],villeEl,acList,status);return;}
  status.textContent='⏳ Recherche…';
  clearTimeout(cpTimer);
  cpTimer=setTimeout(async()=>{
    try{
      const res=await fetch(`https://geo.api.gouv.fr/communes?codePostal=${cp}&fields=nom&limit=20`);
      const json=await res.json();
      if(json&&json.length>0){cpCache[cp]=json.map(c=>c.nom);showCpResult(cpCache[cp],villeEl,acList,status);}
      else{status.textContent='Inconnu — saisir manuellement';status.style.color='var(--danger)';}
    }catch(e){status.textContent='Hors ligne — saisir manuellement';status.style.color='var(--muted)';}
  },400);
}
function showCpResult(villes,villeEl,acList,status){
  if(villes.length===1){
    villeEl.value=villes[0];status.textContent='✓ '+villes[0];status.style.color='var(--accent2)';
    if(acList)acList.classList.remove('open');
  }else{
    status.textContent=villes.length+' communes — choisir ↓';status.style.color='var(--accent)';
    if(acList){
      acList.innerHTML=villes.map(v=>`<div class="ac-item" onclick="pickCpVille('${v.replace(/'/g,"\\'")}',this)"><div class="ac-name">${v}</div></div>`).join('');
      acList._villeEl=villeEl;acList._status=status;acList.classList.add('open');
    }
  }
}
function pickCpVille(v,el){
  const list=el.closest('.ac-list');
  if(list._villeEl)list._villeEl.value=v;
  if(list._status){list._status.textContent='✓ '+v;list._status.style.color='var(--accent2)';}
  list.classList.remove('open');
}

function setupTimeField(hId,mId){
  const h=document.getElementById(hId),m=document.getElementById(mId);
  if(!h||!m)return;
  h.addEventListener('input',function(){this.value=this.value.replace(/\D/g,'');if(this.value.length===2)m.focus();});
  m.addEventListener('input',function(){this.value=this.value.replace(/\D/g,'');});
}
setupTimeField('pH','pM');setupTimeField('dH','dM');
const pad2=n=>String(n).padStart(2,'0');
function parseHM(hVal,mVal){const h=parseInt(hVal)||0,m=parseInt(mVal)||0;if(h<0||h>23||m<0||m>59)return null;return`${pad2(h)}:${pad2(m)}`;}
function splitTime(t){if(!t||!t.includes(':'))return{h:'00',m:'00'};const[h,m]=t.split(':');return{h:h||'00',m:m||'00'};}
const timeToMin=t=>{if(!t||!t.includes(':'))return 0;const[h,m]=t.split(':').map(Number);return h*60+(isNaN(m)?0:m);};
const minToTime=m=>`${pad2(Math.floor(m/60)%24)}:${pad2(m%60)}`;

function renderTournee(tournee){
  const eff=getEffectiveTournee(selectedDate,tournee);

  const bodyEl=document.getElementById(tournee+'Body');
  const metaEl=document.getElementById(tournee+'Meta');
  const durEl=document.getElementById(tournee+'Duration');
  const activeDepots=eff.depots.filter(d=>d.active).sort((a,b)=>timeToMin(a.time)-timeToMin(b.time));
  const{h:dH,m:dM}=splitTime(eff.depart);
  const{h:aH,m:aM}=splitTime(eff.arrivee||'');

  metaEl.innerHTML=`
    <span>🚩 <input class="meta-time-edit" type="text" value="${dH}" maxlength="2" inputmode="numeric" onchange="onDepartChange('${tournee}','h',this.value)"><b style="color:var(--accent)">:</b><input class="meta-time-edit" type="text" value="${dM}" maxlength="2" inputmode="numeric" onchange="onDepartChange('${tournee}','m',this.value)"></span>
    ${eff.arrivee?`<span>🏁 <input class="meta-time-edit" type="text" value="${aH}" maxlength="2" inputmode="numeric" onchange="updateArriveeH('${tournee}',this.value)"><b style="color:var(--accent)">:</b><input class="meta-time-edit" type="text" value="${aM}" maxlength="2" inputmode="numeric" onchange="updateArriveeM('${tournee}',this.value)"></span>`:''}
    <span>👥 <strong>${eff.passengers.length-eff.absents.length+eff.extras.length}</strong> actifs</span>
    <span>📍 <strong>${activeDepots.length}</strong> dépôt${activeDepots.length!==1?'s':''}</span>

    ${eff.extras.length?`<span style="color:var(--accent2)">➕ ${eff.extras.length} extra${eff.extras.length>1?'s':''}</span>`:''}`;

function onDepartChange(tournee,part,val){
  let ov;
  if(tournee==='occasional'){ov=ensureOccasional(selectedDate);}
  else{ov=ensureDayData(selectedDate,tournee);}
  const cur=ov.depart||'00:00';
  const{h,m}=splitTime(cur);
  const newTime=part==='h'?parseHM(val,m):parseHM(h,val);
  if(!newTime)return;
  const diff=timeToMin(newTime)-timeToMin(cur);
  ov.depart=newTime;
  if(diff===0){saveData();render();return;}
  if(tournee==='occasional'){
    ov.passengers.forEach(p=>{p.time=minToTime(timeToMin(p.time)+diff);});
    ov.depots.forEach(d=>{d.time=minToTime(timeToMin(d.time)+diff);});
  }else{
    base[tournee].passengers.forEach(p=>{p.time=minToTime(timeToMin(p.time)+diff);});
    base[tournee].depots.forEach(d=>{d.time=minToTime(timeToMin(d.time)+diff);});
    ov.extras.forEach(p=>{p.time=minToTime(timeToMin(p.time)+diff);});
    ov.depots.forEach(d=>{d.time=minToTime(timeToMin(d.time)+diff);});
    if(ov.arrivee)ov.arrivee=minToTime(timeToMin(ov.arrivee)+diff);
    if(base[tournee].arrivee)base[tournee].arrivee=minToTime(timeToMin(base[tournee].arrivee)+diff);
    if(base[tournee].departCircuit)base[tournee].departCircuit=minToTime(timeToMin(base[tournee].departCircuit)+diff);
    if(ov.departCircuit)ov.departCircuit=minToTime(timeToMin(ov.departCircuit)+diff);
  }
  saveData();render();
}

// ORS ROUTING
// ══════════════════════════════════════════
function getFullAddress(p){return`${p.adresse||''} ${p.codePostal||''} ${p.ville||''}`.trim();}
async function geocodeAddress(address){
  try{const res=await fetch(`https://api.openrouteservice.org/geocode/search?api_key=${ORS_KEY}&text=${encodeURIComponent(address)}&boundary.country=FR&size=1`);const json=await res.json();if(json.features&&json.features.length>0)return json.features[0].geometry.coordinates;}catch(e){}return null;
}
async function getRouteDuration(a,b){
  try{const res=await fetch(`https://api.openrouteservice.org/v2/directions/driving-car?api_key=${ORS_KEY}&start=${a[0]},${a[1]}&end=${b[0]},${b[1]}`);const json=await res.json();if(json.features&&json.features[0])return json.features[0].properties.segments[0].duration;}catch(e){}return null;
}
function showRoutingStatus(msg,type=''){const el=document.getElementById('routingStatus');if(!msg){el.innerHTML='';return;}el.innerHTML=`<div class="routing-banner ${type}">${msg}</div>`;}

async function recalcWithRouting(tournee){
  let passengers,ov,depart;
  if(tournee==='occasional'){
    const occ=ensureOccasional(selectedDate);
    passengers=[...occ.passengers];
    ov=occ;depart=occ.depart;
  }else{
    const eff=getEffectiveTournee(selectedDate,tournee);
    ov=ensureDayData(selectedDate,tournee);
    passengers=[...eff.passengers.filter(p=>!eff.absents.includes(p.id)),...eff.extras];
    depart=eff.depart;
  }
  if(!passengers.length){showRoutingStatus('Aucun passager actif.','error');setTimeout(()=>showRoutingStatus(''),3000);return;}
  showRoutingStatus(`<span class="spinner"></span> Recalcul en cours…`,'loading');
  try{
    passengers.sort((a,b)=>timeToMin(a.time)-timeToMin(b.time));
    const coords=[];
    for(const p of passengers){coords.push(await geocodeAddress(getFullAddress(p)));await sleep(150);}
    const durations=[];
    for(let i=0;i<coords.length-1;i++){
      if(coords[i]&&coords[i+1]){const s=await getRouteDuration(coords[i],coords[i+1]);durations.push(s!==null?Math.ceil(s/60)+2:8);await sleep(150);}
      else durations.push(8);
    }
    if(tournee==='morning'){
      const ad=ov.depots.filter(d=>d.active).sort((a,b)=>timeToMin(a.time)-timeToMin(b.time));
      const dt=ad.length?timeToMin(ad[0].time):timeToMin("08:35");
      let cur=dt-20-durations.reduce((a,b)=>a+b,0);
      passengers.forEach((p,i)=>{p.time=minToTime(cur);if(i<durations.length)cur+=durations[i];});
      ov.arrivee=minToTime((ad.length?timeToMin(ad[ad.length-1].time):dt+10)+15);
    }else{
      const ad=(tournee==='occasional'?ov.depots:ov.depots).filter(d=>d.active).sort((a,b)=>timeToMin(a.time)-timeToMin(b.time));
      let cur=ad.length?timeToMin(ad[ad.length-1].time)+15:timeToMin(depart)+5;
      passengers.forEach((p,i)=>{p.time=minToTime(cur);if(i<durations.length)cur+=durations[i];});
    }
    // Réécrire les temps dans les vraies structures
    if(tournee==='occasional'){
      passengers.forEach(p=>{const orig=ov.passengers.find(x=>x.id===p.id);if(orig)orig.time=p.time;});
    }else{
      const eff=getEffectiveTournee(selectedDate,tournee);
      passengers.forEach(p=>{
        const base_p=base[tournee].passengers.find(x=>x.id===p.id);
        if(base_p)base_p.time=p.time;
        else{const ex=ov.extras.find(x=>x.id===p.id);if(ex)ex.time=p.time;}
      });
    }
    saveData();render();
    showRoutingStatus(`✓ Horaires recalculés — ${coords.filter(Boolean).length}/${passengers.length} adresses trouvées`,'');
    setTimeout(()=>showRoutingStatus(''),5000);
  }catch(e){showRoutingStatus('⚠ Erreur de calcul.','error');saveData();render();}
}
const sleep=ms=>new Promise(r=>setTimeout(r,ms));

function savePassenger(){
  const nom=document.getElementById('pNom').value.trim();
  if(!nom){alert('Veuillez saisir un nom.');return;}
  const heure=parseHM(document.getElementById('pH').value,document.getElementById('pM').value);

  const obj={

    type:document.getElementById('pType').value,time:heure
  };
  addOrUpdateCarnet(obj);
  if(editingBasePassengerId){

    const ov=ensureDayData(selectedDate,currentTournee);
    if(!ov.overrides)ov.overrides={};
    ov.overrides[editingBasePassengerId]=obj;
    editingBasePassengerId=null;
  }else if(currentTournee==='occasional'){
    const occ=ensureOccasional(selectedDate);
    if(editingPassengerId){Object.assign(occ.passengers.find(x=>x.id===editingPassengerId),obj);}
    else{occ.passengers.push({id:nextId++,...obj});}
    occ.passengers.sort((a,b)=>timeToMin(a.time)-timeToMin(b.time));
  }else{
    const ov=ensureDayData(selectedDate,currentTournee);
    if(editingPassengerId){Object.assign(ov.extras.find(x=>x.id===editingPassengerId),obj);}
    else{ov.extras.push({id:nextId++,...obj});}
    ov.extras.sort((a,b)=>timeToMin(a.time)-timeToMin(b.time));
  }
  saveData();render();renderWeekNav();closePassengerModal();
}

// ══════════════════════════════════════════
// DÉPÔTS
// ══════════════════════════════════════════
function deactivateDepot(tournee,id){
  let depots;
  if(tournee==='occasional'){depots=ensureOccasional(selectedDate).depots;}
  else{depots=ensureDayData(selectedDate,tournee).depots;}
  const d=depots.find(x=>x.id===id);if(d){d.active=false;saveData();render();}
}
function openDepotModal(tournee){
  editingDepotTournee=tournee;
  const labels={morning:'Matin',evening:'Soir',occasional:'Occasionnel'};
  document.getElementById('depotsTitle').textContent=`📍 Dépôts — ${labels[tournee]}`;
  renderDepotsList();document.getElementById('modalDepots').classList.add('open');
}
function closeDepotModal(){document.getElementById('modalDepots').classList.remove('open');}
function getEditingDepots(){
  if(editingDepotTournee==='occasional')return ensureOccasional(selectedDate).depots;
  return ensureDayData(selectedDate,editingDepotTournee).depots;
}
function renderDepotsList(){
  const depots=getEditingDepots();const c=document.getElementById('depotsList');
  if(!depots.length){c.innerHTML='<p style="color:var(--muted);font-size:13px;padding:8px 0">Aucun dépôt.</p>';return;}
  c.innerHTML=depots.map(d=>{const{h,m}=splitTime(d.time);return`
    <div class="depot-item">
      <input type="checkbox" class="depot-checkbox" ${d.active?'checked':''} onchange="setDepotActive(${d.id},this.checked)">
      <div class="depot-item-label" style="font-weight:${d.active?600:400};color:${d.active?'var(--text)':'var(--muted)'}">${d.nom}${d.adresse?` <span style="color:var(--muted);font-size:11px">(${d.adresse})</span>`:''}</div>
      <input type="text" class="depot-time-h" value="${h}" maxlength="2" inputmode="numeric" onchange="updateDepotH(${d.id},this.value)">
      <span style="color:var(--accent);font-weight:800">:</span>
      <input type="text" class="depot-time-m" value="${m}" maxlength="2" inputmode="numeric" onchange="updateDepotM(${d.id},this.value)">
      <button class="icon-btn delete-btn" onclick="removeDepot(${d.id})">🗑</button>
    </div>`;}).join('');
}
function setDepotActive(id,val){const d=getEditingDepots().find(x=>x.id===id);if(d){d.active=val;saveData();renderDepotsList();render();}}
function updateDepotH(id,val){const d=getEditingDepots().find(x=>x.id===id);if(d){const{m}=splitTime(d.time);const t=parseHM(val,m);if(t){d.time=t;saveData();render();}}}
function updateDepotM(id,val){const d=getEditingDepots().find(x=>x.id===id);if(d){const{h}=splitTime(d.time);const t=parseHM(h,val);if(t){d.time=t;saveData();render();}}}
function removeDepot(id){const arr=getEditingDepots();const idx=arr.findIndex(x=>x.id===id);if(idx>=0){arr.splice(idx,1);saveData();renderDepotsList();render();}}
function addDepot(){
  const nom=document.getElementById('dNom').value.trim();if(!nom){alert("Saisir le nom.");return;}
  const heure=parseHM(document.getElementById('dH').value,document.getElementById('dM').value)||'08:35';
  getEditingDepots().push({id:nextId++,time:heure,nom,adresse:document.getElementById('dAdresse').value.trim(),active:true});
  document.getElementById('dNom').value='';document.getElementById('dAdresse').value='';
  document.getElementById('dH').value='';document.getElementById('dM').value='';
  saveData();renderDepotsList();render();
}

['modalPassager','modalDepots'].forEach(id=>{
  document.getElementById(id).addEventListener('click',function(e){if(e.target===this){closePassengerModal();closeDepotModal();}});
});

// INIT
loadData();
renderWeekNav();
render();
</script>
