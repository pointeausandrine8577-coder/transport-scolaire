<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transport Scolaire — ETS85-AIZ-C05</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0d1117; --surface:#161b22; --surface2:#21262d; --border:#30363d;
    --accent:#f0a500; --accent2:#3fb950; --text:#e6edf3; --muted:#8b949e;
    --danger:#f85149; --blue:#58a6ff; --morning:#f0a500; --evening:#58a6ff;
    --occasional:#c084fc;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:0 0 80px;}

  header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;}
  .bus-icon{font-size:22px;background:var(--accent);width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .header-info{flex:1;min-width:0;}
  header h1{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;}
  header p{font-size:11px;color:var(--muted);margin-top:1px;}
  .date-badge{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:6px 10px;text-align:right;flex-shrink:0;}
  .date-day{font-family:'Syne',sans-serif;font-weight:700;font-size:13px;color:var(--accent);}
  .date-full{font-size:10px;color:var(--muted);margin-top:1px;}
  .save-indicator{font-size:10px;color:var(--accent2);margin-top:2px;}

  .container{max-width:960px;margin:0 auto;padding:16px 12px;}
  .stats-bar{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
  .stat{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:10px 14px;flex:1;min-width:80px;}
  .stat-num{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--accent);}
  .stat-label{font-size:10px;color:var(--muted);margin-top:2px;}

  .section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:8px;flex-wrap:wrap;}
  .section-title{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;display:flex;align-items:center;gap:8px;}
  .btn-group{display:flex;gap:6px;flex-wrap:wrap;}

  .btn{border:none;border-radius:9px;padding:8px 12px;font-family:'Syne',sans-serif;font-weight:700;font-size:11px;cursor:pointer;display:inline-flex;align-items:center;gap:4px;transition:all 0.2s;white-space:nowrap;}
  .btn-primary{background:var(--accent);color:#000;}
  .btn-primary:hover{background:#ffc107;}
  .btn-blue{background:rgba(88,166,255,0.12);color:var(--blue);border:1px solid rgba(88,166,255,0.3);}
  .btn-purple{background:rgba(192,132,252,0.12);color:var(--occasional);border:1px solid rgba(192,132,252,0.3);}
  .btn-green{background:rgba(63,185,80,0.12);color:var(--accent2);border:1px solid rgba(63,185,80,0.3);}

  .badge{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.4px;}
  .badge-morning{background:rgba(240,165,0,0.15);color:var(--morning);border:1px solid rgba(240,165,0,0.3);}
  .badge-evening{background:rgba(88,166,255,0.15);color:var(--evening);border:1px solid rgba(88,166,255,0.3);}

  .route-block{background:var(--surface);border:1px solid var(--border);border-radius:15px;overflow:hidden;margin-bottom:24px;}
  .route-meta{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;gap:12px;font-size:11px;color:var(--muted);background:var(--surface2);flex-wrap:wrap;align-items:center;}
  .route-meta span{display:flex;align-items:center;gap:4px;}
  .route-meta strong{color:var(--text);}
  .arrival-edit{background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:3px 7px;color:var(--text);font-size:12px;font-family:'Syne',sans-serif;font-weight:700;width:75px;}
  .arrival-edit:focus{outline:none;border-color:var(--accent);}

  /* CARTES */
  .cards-list{padding:8px;display:flex;flex-direction:column;gap:8px;}
  .passenger-card{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;display:flex;gap:12px;align-items:flex-start;}
  .passenger-card.depot-card{background:rgba(88,166,255,0.04);border-color:rgba(88,166,255,0.2);}
  .passenger-card.occasional-card{background:rgba(192,132,252,0.05);border-color:rgba(192,132,252,0.2);}

  .card-time{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;min-width:54px;flex-shrink:0;padding-top:2px;}
  .time-morning{color:var(--morning);}
  .time-evening{color:var(--evening);}

  .card-body{flex:1;min-width:0;}
  .card-top{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:5px;}
  .card-name{font-weight:600;font-size:14px;}
  .card-address{font-size:12px;color:var(--muted);margin-bottom:3px;word-break:break-word;}
  .card-note{font-size:11px;color:#6e7681;font-style:italic;}
  .card-contact{font-size:11px;color:var(--muted);font-family:monospace;margin-top:4px;}

  .card-actions{display:flex;flex-direction:column;gap:6px;flex-shrink:0;}
  .icon-btn{background:none;border:1px solid var(--border);width:34px;height:34px;border-radius:9px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
  .edit-btn:hover{background:rgba(240,165,0,0.12);border-color:rgba(240,165,0,0.4);}
  .delete-btn:hover{background:rgba(248,81,73,0.1);border-color:rgba(248,81,73,0.4);}

  .type-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:600;}
  .type-montee{background:rgba(63,185,80,0.1);color:var(--accent2);}
  .type-descente{background:rgba(248,81,73,0.12);color:#ff7b72;}
  .type-depot{background:rgba(88,166,255,0.1);color:var(--blue);}
  .type-occa{background:rgba(192,132,252,0.12);color:var(--occasional);}

  .duration-info{font-size:11px;color:var(--muted);padding:8px 14px;border-top:1px solid var(--border);background:var(--surface2);display:flex;justify-content:space-between;flex-wrap:wrap;gap:6px;}
  .empty-state{text-align:center;padding:28px;color:var(--muted);font-size:13px;}

  .routing-banner{background:rgba(63,185,80,0.08);border:1px solid rgba(63,185,80,0.2);border-radius:9px;padding:10px 14px;font-size:12px;color:var(--accent2);margin-bottom:16px;display:flex;align-items:center;gap:8px;}
  .routing-banner.loading{background:rgba(240,165,0,0.08);border-color:rgba(240,165,0,0.2);color:var(--accent);}
  .routing-banner.error{background:rgba(248,81,73,0.08);border-color:rgba(248,81,73,0.2);color:var(--danger);}

  /* MODALS — slide du bas sur mobile */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.82);z-index:200;align-items:flex-end;justify-content:center;}
  .modal-overlay.open{display:flex;}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:20px 20px 0 0;padding:12px 18px 36px;width:100%;max-width:540px;animation:slideUp .25s ease;max-height:94vh;overflow-y:auto;}
  @keyframes slideUp{from{transform:translateY(40px);opacity:0;}to{transform:translateY(0);opacity:1;}}
  .modal-handle{width:44px;height:5px;background:var(--border);border-radius:3px;margin:0 auto 18px;}
  .modal h2{font-family:'Syne',sans-serif;font-weight:700;font-size:16px;margin-bottom:16px;}
  .form-group{margin-bottom:12px;}
  label{display:block;font-size:11px;color:var(--muted);margin-bottom:5px;font-weight:500;text-transform:uppercase;letter-spacing:.4px;}
  input,select,textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:11px 13px;color:var(--text);font-size:15px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .15s;-webkit-appearance:none;}
  textarea{resize:vertical;min-height:60px;font-size:14px;}
  input:focus,select:focus,textarea:focus{border-color:var(--accent);}
  select option{background:var(--surface2);}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .modal-actions{display:flex;gap:8px;margin-top:20px;}
  .btn-cancel{flex:1;padding:13px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:14px;cursor:pointer;font-family:'DM Sans',sans-serif;}
  .btn-save{flex:2;padding:13px;background:var(--accent);border:none;border-radius:12px;color:#000;font-size:15px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif;}
  .btn-save-purple{background:var(--occasional);color:#000;}

  .occasional-banner{background:rgba(192,132,252,0.1);border:1px solid rgba(192,132,252,0.25);border-radius:9px;padding:10px 14px;font-size:12px;color:var(--occasional);margin-bottom:14px;display:flex;align-items:center;gap:8px;}

  .depot-item{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--border);}
  .depot-item:last-child{border-bottom:none;}
  .depot-checkbox{width:20px;height:20px;accent-color:var(--accent);cursor:pointer;flex-shrink:0;}
  .depot-item-label{flex:1;font-size:13px;}
  .depot-time-input{width:85px!important;padding:7px 9px!important;font-size:13px!important;flex-shrink:0;}
  .section-divider{margin:16px 0 12px;padding-top:14px;border-top:1px solid var(--border);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);}

  .spinner{display:inline-block;width:12px;height:12px;border:2px solid rgba(240,165,0,0.3);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  @media(min-width:700px){
    .modal-overlay{align-items:center;padding:16px;}
    .modal{border-radius:18px;padding:24px;}
    .modal-handle{display:none;}
  }
</style>
</head>
<body>

<header>
  <div class="bus-icon">🚌</div>
  <div class="header-info">
    <h1>Transport Scolaire</h1>
    <p>ETS85-AIZ-C05</p>
  </div>
  <div class="date-badge">
    <div class="date-day" id="dateDay"></div>
    <div class="date-full" id="dateFull"></div>
    <div class="save-indicator" id="saveIndicator">✓ Sauvegardé</div>
  </div>
</header>

<div class="container">
  <div id="routingStatus"></div>
  <div class="stats-bar" id="statsBar"></div>

  <div class="section-header">
    <div class="section-title"><span class="badge badge-morning">☀️ MATIN</span></div>
    <div class="btn-group">
      <button class="btn btn-green" onclick="recalcWithRouting('morning')">🗺 Recalc.</button>
      <button class="btn btn-blue" onclick="openDepotModal('morning')">📍 Dépôts</button>
      <button class="btn btn-purple" onclick="openOccasionalModal('morning')">⚡ Occa.</button>
      <button class="btn btn-primary" onclick="openPassengerModal('morning')">+ Passager</button>
    </div>
  </div>
  <div class="route-block">
    <div class="route-meta" id="morningMeta"></div>
    <div class="cards-list" id="morningBody"></div>
    <div class="duration-info" id="morningDuration"></div>
  </div>

  <div class="section-header">
    <div class="section-title"><span class="badge badge-evening">🌙 SOIR</span></div>
    <div class="btn-group">
      <button class="btn btn-green" onclick="recalcWithRouting('evening')">🗺 Recalc.</button>
      <button class="btn btn-blue" onclick="openDepotModal('evening')">📍 Dépôts</button>
      <button class="btn btn-purple" onclick="openOccasionalModal('evening')">⚡ Occa.</button>
      <button class="btn btn-primary" onclick="openPassengerModal('evening')">+ Passager</button>
    </div>
  </div>
  <div class="route-block">
    <div class="route-meta" id="eveningMeta"></div>
    <div class="cards-list" id="eveningBody"></div>
    <div class="duration-info" id="eveningDuration"></div>
  </div>
</div>

<!-- MODAL PASSAGER -->
<div class="modal-overlay" id="modalPassager">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 id="modalPassagerTitle">➕ Nouveau passager</h2>
    <div class="form-row">
      <div class="form-group"><label>Nom</label><input type="text" id="pNom" placeholder="DUPONT" autocomplete="off"></div>
      <div class="form-group"><label>Prénom</label><input type="text" id="pPrenom" placeholder="Lucas" autocomplete="off"></div>
    </div>
    <div class="form-group"><label>Adresse (rue)</label><input type="text" id="pAdresse" placeholder="12 rue des Lilas" autocomplete="off"></div>
    <div class="form-row">
      <div class="form-group"><label>Code postal</label><input type="text" id="pCodePostal" placeholder="85190" maxlength="10" inputmode="numeric"></div>
      <div class="form-group"><label>Ville</label><input type="text" id="pVille" placeholder="Aizenay" autocomplete="off"></div>
    </div>
    <div class="form-group"><label>Note / Repère</label><textarea id="pNote" placeholder="Portail bleu, 2ème maison..."></textarea></div>
    <div class="form-row">
      <div class="form-group"><label>Lien</label>
        <select id="pLien"><option>Mère</option><option>Père</option><option>Mobile</option><option>Tuteur</option></select></div>
      <div class="form-group"><label>Téléphone</label><input type="tel" id="pTel" placeholder="06 XX XX XX XX"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Type</label>
        <select id="pType"><option value="Montée">Montée</option><option value="Descente">Descente</option></select></div>
      <div class="form-group"><label>Heure (ex: 07:07)</label><input type="text" id="pHeure" placeholder="07:00" maxlength="5" inputmode="numeric"></div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closePassengerModal()">Annuler</button>
      <button class="btn-save" onclick="savePassenger()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- MODAL OCCASIONNEL -->
<div class="modal-overlay" id="modalOccasional">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>⚡ Transport occasionnel</h2>
    <div class="occasional-banner">🗓 Affiché aujourd'hui uniquement, retiré demain.</div>
    <div class="form-row">
      <div class="form-group"><label>Nom</label><input type="text" id="oNom" placeholder="DUPONT"></div>
      <div class="form-group"><label>Prénom</label><input type="text" id="oPrenom" placeholder="Lucas"></div>
    </div>
    <div class="form-group"><label>Adresse (rue)</label><input type="text" id="oAdresse" placeholder="12 rue des Lilas"></div>
    <div class="form-row">
      <div class="form-group"><label>Code postal</label><input type="text" id="oCodePostal" placeholder="85190" maxlength="10" inputmode="numeric"></div>
      <div class="form-group"><label>Ville</label><input type="text" id="oVille" placeholder="Aizenay"></div>
    </div>
    <div class="form-group"><label>Note</label><textarea id="oNote" placeholder="Remarque..."></textarea></div>
    <div class="form-row">
      <div class="form-group"><label>Lien</label>
        <select id="oLien"><option>Mère</option><option>Père</option><option>Mobile</option><option>Tuteur</option></select></div>
      <div class="form-group"><label>Téléphone</label><input type="tel" id="oTel" placeholder="06 XX XX XX XX"></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Type</label>
        <select id="oType"><option value="Montée">Montée</option><option value="Descente">Descente</option></select></div>
      <div class="form-group"><label>Heure (ex: 07:07)</label><input type="text" id="oHeure" placeholder="07:00" maxlength="5" inputmode="numeric"></div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeOccasionalModal()">Annuler</button>
      <button class="btn-save btn-save-purple" onclick="saveOccasional()">Ajouter pour aujourd'hui</button>
    </div>
  </div>
</div>

<!-- MODAL DÉPÔTS -->
<div class="modal-overlay" id="modalDepots">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 id="depotsTitle">📍 Gérer les dépôts</h2>
    <p style="font-size:12px;color:var(--muted);margin-bottom:14px">Cochez les dépôts actifs aujourd'hui.</p>
    <div id="depotsList"></div>
    <div class="section-divider">Ajouter un établissement</div>
    <div class="form-row">
      <div class="form-group"><label>Nom</label><input type="text" id="dNom" placeholder="Lycée Colette"></div>
      <div class="form-group"><label>Heure</label><input type="text" id="dHeure" placeholder="08:35" maxlength="5" inputmode="numeric"></div>
    </div>
    <div class="form-group"><label>Adresse (optionnel)</label><input type="text" id="dAdresse" placeholder="Aizenay"></div>
    <button class="btn btn-primary" style="width:100%;justify-content:center;padding:13px;font-size:14px;margin-top:4px" onclick="addDepot()">+ Ajouter</button>
    <div class="modal-actions" style="margin-top:14px">
      <button class="btn-cancel" onclick="closeDepotModal()">Fermer</button>
    </div>
  </div>
</div>

let data,nextId=300,currentTournee='morning',editingPassengerId=null,editingDepotTournee=null;

function loadData(){
  try{
    const saved=localStorage.getItem('transport_data_v2');
    const savedDate=localStorage.getItem('transport_date');
    if(saved){
      data=JSON.parse(saved);
      if(savedDate!==todayStr){data.morning.occasional=[];data.evening.occasional=[];}
      if(!data.morning.occasional)data.morning.occasional=[];
      if(!data.evening.occasional)data.evening.occasional=[];
      ['morning','evening'].forEach(t=>{data[t].passengers.forEach(p=>{if(!p.codePostal)p.codePostal='';if(!p.ville)p.ville='';});});
    }else{data=JSON.parse(JSON.stringify(DEFAULT_DATA));}
    localStorage.setItem('transport_date',todayStr);
  }catch(e){data=JSON.parse(JSON.stringify(DEFAULT_DATA));}
}
function saveData(){
  try{
    localStorage.setItem('transport_data_v2',JSON.stringify(data));
    localStorage.setItem('transport_date',todayStr);
    const ind=document.getElementById('saveIndicator');
    ind.textContent='✓ Sauvegardé';ind.style.color='var(--accent2)';
  }catch(e){document.getElementById('saveIndicator').textContent='⚠ Erreur';}
}

const timeToMin=t=>{if(!t||!t.includes(':'))return 0;const[h,m]=t.split(':').map(Number);return h*60+(isNaN(m)?0:m);};
const minToTime=m=>`${String(Math.floor(m/60)%24).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`;
function validateTime(val){
  const clean=val.trim();
  const match=clean.match(/^(\d{1,2})[h:](\d{2})$/);
  if(!match)return null;
  const h=parseInt(match[1]),m=parseInt(match[2]);
  if(h<0||h>23||m<0||m>59)return null;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

function render(){renderTournee('morning');renderTournee('evening');renderStats();}

function renderTournee(tournee){
  const t=data[tournee];
  const body=document.getElementById(tournee==='morning'?'morningBody':'eveningBody');
  const meta=document.getElementById(tournee==='morning'?'morningMeta':'eveningMeta');
  const dur=document.getElementById(tournee==='morning'?'morningDuration':'eveningDuration');
  const cls=tournee==='morning'?'time-morning':'time-evening';
  const activeDepots=t.depots.filter(d=>d.active).sort((a,b)=>timeToMin(a.time)-timeToMin(b.time));

  meta.innerHTML=`
    <span>🚩 Départ <strong>${t.depart}</strong></span>
    ${t.arrivee?`<span>🏁 <strong><input type="text" class="arrival-edit" value="${t.arrivee}" maxlength="5" onchange="updateArrival('${tournee}',this.value)"></strong></span>`:''}
    <span>👥 <strong>${t.passengers.length+t.occasional.length}</strong> pass.</span>
    <span>📍 <strong>${activeDepots.length}</strong> dépôt${activeDepots.length!==1?'s':''}</span>`;

  body.innerHTML='';

  const makeCard=(p,isOcc=false)=>{
    const div=document.createElement('div');
    div.className=`passenger-card${isOcc?' occasional-card':''}`;
    const addrDisplay=[p.adresse,p.codePostal,p.ville].filter(Boolean).join(', ');
    div.innerHTML=`
      <div class="card-time ${cls}">${p.time}</div>
      <div class="card-body">
        <div class="card-top">
          <span class="type-badge ${p.type==='Montée'?'type-montee':'type-descente'}">${p.type==='Montée'?'⬆':'⬇'} ${p.type}</span>
          ${isOcc?'<span class="type-badge type-occa">⚡ 1j</span>':''}
          <span class="card-name">${p.nom}</span>
        </div>
        <div class="card-address">${addrDisplay||'—'}</div>
        ${p.note?`<div class="card-note">💬 ${p.note}</div>`:''}
        <div class="card-contact">${p.lien}: ${p.tel}</div>
      </div>
      <div class="card-actions">
        ${!isOcc?`<button class="icon-btn edit-btn" onclick="openEditPassenger('${tournee}',${p.id})">✏️</button>`:''}
        <button class="icon-btn delete-btn" onclick="${isOcc?`deleteOccasional('${tournee}',${p.id})`:`deletePassenger('${tournee}',${p.id})`}">✕</button>
      </div>`;
    return div;
  };

  const makeDepotCard=(d,label)=>{
    const div=document.createElement('div');
    div.className='passenger-card depot-card';
    div.innerHTML=`
      <div class="card-time ${cls}">${d.time}</div>
      <div class="card-body">
        <div class="card-top"><span class="type-badge type-depot">📍 ${label}</span><span class="card-name">${d.nom}</span></div>
        ${d.adresse?`<div class="card-address">${d.adresse}</div>`:''}
      </div>
      <div class="card-actions">
        <button class="icon-btn delete-btn" onclick="deactivateDepot('${tournee}',${d.id})">✕</button>
      </div>`;
    return div;
  };

  const allRows=[];
  if(tournee==='evening')activeDepots.forEach(d=>allRows.push({type:'depot',d,label:'Prise'}));
  t.passengers.forEach(p=>allRows.push({type:'pass',p}));
  t.occasional.forEach(p=>allRows.push({type:'occ',p}));
  if(tournee==='morning')activeDepots.forEach(d=>allRows.push({type:'depot',d,label:'Dépôt'}));

  if(!allRows.length){
    body.innerHTML=`<div class="empty-state">Aucun élément</div>`;
  }else{
    allRows.forEach(r=>{
      if(r.type==='depot')body.appendChild(makeDepotCard(r.d,r.label));
      else body.appendChild(makeCard(r.p,r.type==='occ'));
    });
  }

  if(t.passengers.length>0){
    const first=timeToMin(t.passengers[0].time),last=timeToMin(t.passengers[t.passengers.length-1].time);
    dur.innerHTML=`<span>Durée ~<strong>${last-timeToMin(t.depart)+20} min</strong></span><span>1er→dernier: <strong>${last-first} min</strong></span>`;
  }else dur.innerHTML='';
}

function renderStats(){
  const unique=new Set([...data.morning.passengers,...data.evening.passengers].map(p=>p.nom));
  const occ=data.morning.occasional.length+data.evening.occasional.length;
  document.getElementById('statsBar').innerHTML=`
    <div class="stat"><div class="stat-num">${data.morning.passengers.length}</div><div class="stat-label">☀️ Matin</div></div>
    <div class="stat"><div class="stat-num" style="color:var(--evening)">${data.evening.passengers.length}</div><div class="stat-label">🌙 Soir</div></div>
    <div class="stat"><div class="stat-num" style="color:var(--accent2)">${unique.size}</div><div class="stat-label">Enfants</div></div>
    ${occ?`<div class="stat"><div class="stat-num" style="color:var(--occasional)">${occ}</div><div class="stat-label">Occas.</div></div>`:''}`;
}

function updateArrival(tournee,val){
  const t=validateTime(val);if(!t){alert('Format invalide. Ex: 09:03');render();return;}
  data[tournee].arrivee=t;saveData();render();
}

// ORS
function getFullAddress(p){return `${p.adresse||''} ${p.codePostal||''} ${p.ville||''}`.trim();}
async function geocodeAddress(address){
  try{
    const res=await fetch(`https://api.openrouteservice.org/geocode/search?api_key=${ORS_KEY}&text=${encodeURIComponent(address)}&boundary.country=FR&size=1`);
    const json=await res.json();
    if(json.features&&json.features.length>0)return json.features[0].geometry.coordinates;
  }catch(e){}return null;
}
async function getRouteDuration(a,b){
  try{
    const res=await fetch(`https://api.openrouteservice.org/v2/directions/driving-car?api_key=${ORS_KEY}&start=${a[0]},${a[1]}&end=${b[0]},${b[1]}`);
    const json=await res.json();
    if(json.features&&json.features[0])return json.features[0].properties.segments[0].duration;
  }catch(e){}return null;
}
function showRoutingStatus(msg,type=''){
  const el=document.getElementById('routingStatus');
  if(!msg){el.innerHTML='';return;}
  el.innerHTML=`<div class="routing-banner ${type}">${msg}</div>`;
}
async function recalcWithRouting(tournee){
  const t=data[tournee];
  if(!t.passengers.length){alert('Aucun passager.');return;}
  showRoutingStatus(`<span class="spinner"></span> Calcul en cours…`,'loading');
  try{
    const passengers=[...t.passengers].sort((a,b)=>timeToMin(a.time)-timeToMin(b.time));
    const coords=[];
    for(const p of passengers){const c=await geocodeAddress(getFullAddress(p));coords.push(c);await sleep(150);}
    const durations=[];
    for(let i=0;i<coords.length-1;i++){
      if(coords[i]&&coords[i+1]){const s=await getRouteDuration(coords[i],coords[i+1]);durations.push(s!==null?Math.ceil(s/60)+2:8);await sleep(150);}
      else durations.push(8);
    }
    if(tournee==='morning'){
      const ad=t.depots.filter(d=>d.active).sort((a,b)=>timeToMin(a.time)-timeToMin(b.time));
      const dt=ad.length?timeToMin(ad[0].time):timeToMin("08:35");
      let cur=dt-20-durations.reduce((a,b)=>a+b,0);
      passengers.forEach((p,i)=>{p.time=minToTime(cur);if(i<durations.length)cur+=durations[i];});
      const ld=ad.length?timeToMin(ad[ad.length-1].time):dt+10;
      t.arrivee=minToTime(ld+15);
    }else{
      const ad=t.depots.filter(d=>d.active).sort((a,b)=>timeToMin(a.time)-timeToMin(b.time));
      let cur=ad.length?timeToMin(ad[ad.length-1].time)+15:timeToMin("16:35");
      passengers.forEach((p,i)=>{p.time=minToTime(cur);if(i<durations.length)cur+=durations[i];});
    }
    t.passengers=passengers;
    saveData();render();
    showRoutingStatus(`✓ Horaires recalculés — ${coords.filter(Boolean).length}/${passengers.length} adresses trouvées`,'');
    setTimeout(()=>showRoutingStatus(''),5000);
  }catch(e){showRoutingStatus('⚠ Erreur de calcul.','error');saveData();render();}
}
const sleep=ms=>new Promise(r=>setTimeout(r,ms));

// PASSAGERS
function deletePassenger(tournee,id){data[tournee].passengers=data[tournee].passengers.filter(p=>p.id!==id);saveData();render();}
function openPassengerModal(tournee,id=null){
  currentTournee=tournee;editingPassengerId=id;
  document.getElementById('modalPassagerTitle').textContent=id?'✏️ Modifier le passager':'➕ Nouveau passager';
  if(id){
    const p=data[tournee].passengers.find(x=>x.id===id);
    const parts=p.nom.split(' ');
    document.getElementById('pNom').value=parts[0]||'';
    document.getElementById('pPrenom').value=parts.slice(1).join(' ')||'';
    document.getElementById('pAdresse').value=p.adresse||'';
    document.getElementById('pCodePostal').value=p.codePostal||'';
    document.getElementById('pVille').value=p.ville||'';
    document.getElementById('pNote').value=p.note||'';
    document.getElementById('pLien').value=p.lien||'Mère';
    document.getElementById('pTel').value=p.tel||'';
    document.getElementById('pType').value=p.type||'Montée';
    document.getElementById('pHeure').value=p.time||'07:00';
  }else{
    document.getElementById('pType').value=tournee==='morning'?'Montée':'Descente';
    ['pNom','pPrenom','pAdresse','pCodePostal','pVille','pNote','pTel'].forEach(i=>document.getElementById(i).value='');
    document.getElementById('pHeure').value=tournee==='morning'?'07:00':'17:00';
  }
  document.getElementById('modalPassager').classList.add('open');
}
function openEditPassenger(tournee,id){openPassengerModal(tournee,id);}
function closePassengerModal(){document.getElementById('modalPassager').classList.remove('open');editingPassengerId=null;}
function savePassenger(){
  const nom=document.getElementById('pNom').value.trim();
  if(!nom){alert('Veuillez saisir un nom.');return;}
  const heure=validateTime(document.getElementById('pHeure').value.trim());
  if(!heure){alert('Heure invalide. Ex: 07:07');return;}
  const obj={nom:`${nom.toUpperCase()} ${document.getElementById('pPrenom').value.trim()}`.trim(),
    adresse:document.getElementById('pAdresse').value.trim(),
    codePostal:document.getElementById('pCodePostal').value.trim(),
    ville:document.getElementById('pVille').value.trim(),
    note:document.getElementById('pNote').value.trim(),
    lien:document.getElementById('pLien').value,
    tel:document.getElementById('pTel').value.trim()||'—',
    type:document.getElementById('pType').value,time:heure};
  if(editingPassengerId){Object.assign(data[currentTournee].passengers.find(x=>x.id===editingPassengerId),obj);}
  else{data[currentTournee].passengers.push({id:nextId++,...obj});}
  data[currentTournee].passengers.sort((a,b)=>timeToMin(a.time)-timeToMin(b.time));
  saveData();render();closePassengerModal();
}

// OCCASIONNELS
function openOccasionalModal(tournee){
  currentTournee=tournee;
  document.getElementById('oType').value=tournee==='morning'?'Montée':'Descente';
  document.getElementById('oHeure').value=tournee==='morning'?'07:00':'17:00';
  ['oNom','oPrenom','oAdresse','oCodePostal','oVille','oNote','oTel'].forEach(i=>document.getElementById(i).value='');
  document.getElementById('modalOccasional').classList.add('open');
}
function closeOccasionalModal(){document.getElementById('modalOccasional').classList.remove('open');}
function saveOccasional(){
  const nom=document.getElementById('oNom').value.trim();
  if(!nom){alert('Veuillez saisir un nom.');return;}
  const heure=validateTime(document.getElementById('oHeure').value.trim());
  if(!heure){alert('Heure invalide. Ex: 07:07');return;}
  data[currentTournee].occasional.push({id:nextId++,date:todayStr,
    nom:`${nom.toUpperCase()} ${document.getElementById('oPrenom').value.trim()}`.trim(),
    adresse:document.getElementById('oAdresse').value.trim(),
    codePostal:document.getElementById('oCodePostal').value.trim(),
    ville:document.getElementById('oVille').value.trim(),
    note:document.getElementById('oNote').value.trim(),
    lien:document.getElementById('oLien').value,
    tel:document.getElementById('oTel').value.trim()||'—',
    type:document.getElementById('oType').value,time:heure});
  saveData();render();closeOccasionalModal();
}
function deleteOccasional(tournee,id){data[tournee].occasional=data[tournee].occasional.filter(p=>p.id!==id);saveData();render();}

// DÉPÔTS
function deactivateDepot(tournee,id){const d=data[tournee].depots.find(x=>x.id===id);if(d){d.active=false;saveData();render();}}
function openDepotModal(tournee){editingDepotTournee=tournee;document.getElementById('depotsTitle').textContent=tournee==='morning'?'📍 Dépôts — Matin':'📍 Dépôts — Soir';renderDepotsList();document.getElementById('modalDepots').classList.add('open');}
function closeDepotModal(){document.getElementById('modalDepots').classList.remove('open');}
function renderDepotsList(){
  const depots=data[editingDepotTournee].depots;
  const c=document.getElementById('depotsList');
  if(!depots.length){c.innerHTML='<p style="color:var(--muted);font-size:13px;padding:8px 0">Aucun dépôt.</p>';return;}
  c.innerHTML=depots.map(d=>`
    <div class="depot-item">
      <input type="checkbox" class="depot-checkbox" ${d.active?'checked':''} onchange="setDepotActive(${d.id},this.checked)">
      <div class="depot-item-label" style="font-weight:${d.active?600:400};color:${d.active?'var(--text)':'var(--muted)'}">
        ${d.nom}${d.adresse?` <span style="color:var(--muted);font-size:11px">(${d.adresse})</span>`:''}
      </div>
      <input type="text" class="depot-time-input" value="${d.time}" maxlength="5" onchange="updateDepotTime(${d.id},this.value)">
      <button class="icon-btn delete-btn" onclick="removeDepot(${d.id})">🗑</button>
    </div>`).join('');
}
function setDepotActive(id,val){const d=data[editingDepotTournee].depots.find(x=>x.id===id);if(d){d.active=val;saveData();renderDepotsList();render();}}
function updateDepotTime(id,val){const t=validateTime(val);if(!t){alert('Format invalide. Ex: 08:35');renderDepotsList();return;}const d=data[editingDepotTournee].depots.find(x=>x.id===id);if(d){d.time=t;saveData();render();}}
function removeDepot(id){data[editingDepotTournee].depots=data[editingDepotTournee].depots.filter(x=>x.id!==id);saveData();renderDepotsList();render();}
function addDepot(){
  const nom=document.getElementById('dNom').value.trim();
  if(!nom){alert("Saisir le nom.");return;}
  const heure=validateTime(document.getElementById('dHeure').value.trim())||'08:35';
  data[editingDepotTournee].depots.push({id:nextId++,time:heure,nom,adresse:document.getElementById('dAdresse').value.trim(),active:true});
  document.getElementById('dNom').value='';document.getElementById('dAdresse').value='';document.getElementById('dHeure').value='';
  saveData();renderDepotsList();render();
}

['modalPassager','modalOccasional','modalDepots'].forEach(id=>{
  document.getElementById(id).addEventListener('click',function(e){if(e.target===this){closePassengerModal();closeOccasionalModal();closeDepotModal();}});
});

loadData();render();
</script>
