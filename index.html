<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transport Scolaire — ETS85-AIZ-C05</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;--accent:#f0a500;--accent2:#3fb950;--text:#e6edf3;--muted:#8b949e;--danger:#f85149;--blue:#58a6ff;--occasional:#c084fc;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:0 0 80px;}

header{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;}
.bus-icon{font-size:20px;background:var(--accent);width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.header-info{flex:1;}
header h1{font-family:'Syne',sans-serif;font-weight:800;font-size:15px;}
header p{font-size:10px;color:var(--muted);}
.save-indicator{font-size:10px;color:var(--accent2);}

.week-nav{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 12px;display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;}
.week-nav::-webkit-scrollbar{display:none;}
.day-btn{flex-shrink:0;padding:7px 10px;border-radius:10px;border:1px solid var(--border);background:none;color:var(--muted);font-family:'Syne',sans-serif;font-weight:700;font-size:11px;cursor:pointer;text-align:center;min-width:50px;transition:all .2s;}
.day-btn .dn{display:block;font-size:10px;margin-bottom:2px;}
.day-btn .dd{display:block;font-size:15px;}
.day-btn.today{border-color:var(--accent);color:var(--accent);}
.day-btn.active{background:var(--accent);color:#000;border-color:var(--accent);}
.day-btn.has-mod::after{content:'•';color:var(--occasional);font-size:8px;display:block;margin-top:1px;}
.day-btn.weekend{opacity:.35;}
.nav-arrow{flex-shrink:0;padding:7px 8px;border-radius:10px;border:1px solid var(--border);background:none;color:var(--muted);font-family:'Syne',sans-serif;font-weight:700;font-size:14px;cursor:pointer;min-width:30px;}

.container{max-width:960px;margin:0 auto;padding:14px 12px;}
.stats-bar{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:8px 12px;flex:1;min-width:70px;}
.stat-num{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--accent);}
.stat-label{font-size:10px;color:var(--muted);margin-top:1px;}

.sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:6px;flex-wrap:wrap;}
.btn-group{display:flex;gap:5px;flex-wrap:wrap;}
.btn{border:none;border-radius:8px;padding:7px 11px;font-family:'Syne',sans-serif;font-weight:700;font-size:11px;cursor:pointer;display:inline-flex;align-items:center;gap:4px;transition:all .2s;white-space:nowrap;}
.btn-primary{background:var(--accent);color:#000;}
.btn-blue{background:rgba(88,166,255,.12);color:var(--blue);border:1px solid rgba(88,166,255,.3);}
.btn-purple{background:rgba(192,132,252,.12);color:var(--occasional);border:1px solid rgba(192,132,252,.3);}
.btn-green{background:rgba(63,185,80,.12);color:var(--accent2);border:1px solid rgba(63,185,80,.3);}
.btn-red{background:rgba(248,81,73,.12);color:var(--danger);border:1px solid rgba(248,81,73,.3);}

.badge{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;}
.badge-m{background:rgba(240,165,0,.15);color:var(--accent);border:1px solid rgba(240,165,0,.3);}
.badge-e{background:rgba(88,166,255,.15);color:var(--blue);border:1px solid rgba(88,166,255,.3);}
.badge-o{background:rgba(192,132,252,.15);color:var(--occasional);border:1px solid rgba(192,132,252,.3);}

.route-block{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:16px;}
.route-block.occ-block{border-color:rgba(192,132,252,.35);}
.route-meta{padding:9px 13px;border-bottom:1px solid var(--border);display:flex;gap:10px;font-size:11px;color:var(--muted);background:var(--surface2);flex-wrap:wrap;align-items:center;}
.te{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:3px 5px;color:var(--text);font-size:12px;font-family:'Syne',sans-serif;font-weight:700;width:30px;text-align:center;}
.te:focus{outline:none;border-color:var(--accent);}

.cards{padding:7px;display:flex;flex-direction:column;gap:7px;}
.card{background:var(--surface2);border:1px solid var(--border);border-radius:11px;padding:11px 13px;display:flex;gap:10px;align-items:flex-start;}
.card.depot-card{background:rgba(88,166,255,.04);border-color:rgba(88,166,255,.2);}
.card.depart-card{background:rgba(63,185,80,.04);border-color:rgba(63,185,80,.2);}
.card.occ-card{background:rgba(192,132,252,.04);border-color:rgba(192,132,252,.15);}
.card.absent-card{opacity:.4;border-color:rgba(248,81,73,.2);}
.card.extra-card{background:rgba(63,185,80,.04);border-color:rgba(63,185,80,.2);}

.ct{font-family:'Syne',sans-serif;font-weight:800;font-size:17px;min-width:50px;flex-shrink:0;padding-top:2px;}
.ct-m{color:var(--accent);}
.ct-e{color:var(--blue);}
.ct-o{color:var(--occasional);}
.ct-g{color:var(--accent2);}
.cb{flex:1;min-width:0;}
.ctop{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:4px;}
.cname{font-weight:600;font-size:13px;}
.caddr{font-size:11px;color:var(--muted);margin-bottom:2px;word-break:break-word;}
.cnote{font-size:10px;color:#6e7681;font-style:italic;}
.ctel{font-size:10px;color:var(--muted);font-family:monospace;margin-top:3px;}
.cact{display:flex;flex-direction:column;gap:5px;flex-shrink:0;}
.ib{background:none;border:1px solid var(--border);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.ib:hover{background:rgba(240,165,0,.12);border-color:rgba(240,165,0,.4);}
.ib.del:hover{background:rgba(248,81,73,.1);border-color:rgba(248,81,73,.4);}
.ib.restore{background:rgba(63,185,80,.1);border-color:rgba(63,185,80,.3);}

.tbadge{display:inline-flex;align-items:center;gap:2px;padding:2px 7px;border-radius:5px;font-size:10px;font-weight:600;}
.tb-up{background:rgba(63,185,80,.1);color:var(--accent2);}
.tb-down{background:rgba(248,81,73,.12);color:#ff7b72;}
.tb-depot{background:rgba(88,166,255,.1);color:var(--blue);}
.tb-depart{background:rgba(63,185,80,.1);color:var(--accent2);}
.tb-extra{background:rgba(63,185,80,.15);color:var(--accent2);}
.tb-absent{background:rgba(248,81,73,.12);color:var(--danger);}

.dur{font-size:11px;color:var(--muted);padding:7px 13px;border-top:1px solid var(--border);background:var(--surface2);display:flex;justify-content:space-between;flex-wrap:wrap;gap:5px;}
.empty{text-align:center;padding:24px;color:var(--muted);font-size:13px;}

.rbanner{border-radius:8px;padding:9px 13px;font-size:12px;margin-bottom:14px;display:flex;align-items:center;gap:7px;}
.rbanner.ok{background:rgba(63,185,80,.08);border:1px solid rgba(63,185,80,.2);color:var(--accent2);}
.rbanner.loading{background:rgba(240,165,0,.08);border:1px solid rgba(240,165,0,.2);color:var(--accent);}
.rbanner.error{background:rgba(248,81,73,.08);border:1px solid rgba(248,81,73,.2);color:var(--danger);}
.occ-info{background:rgba(192,132,252,.08);border:1px solid rgba(192,132,252,.2);border-radius:8px;padding:9px 13px;font-size:12px;color:var(--occasional);margin-bottom:10px;}

.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:200;align-items:flex-end;justify-content:center;}
.overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:20px 20px 0 0;padding:12px 18px 36px;width:100%;max-width:540px;animation:sUp .25s ease;max-height:94vh;overflow-y:auto;}
@keyframes sUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.mhandle{width:44px;height:5px;background:var(--border);border-radius:3px;margin:0 auto 16px;}
.modal h2{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;margin-bottom:14px;}
.fg{margin-bottom:11px;position:relative;}
label{display:block;font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:500;text-transform:uppercase;letter-spacing:.4px;}
input,select,textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:11px 13px;color:var(--text);font-size:15px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .15s;-webkit-appearance:none;appearance:none;}
textarea{resize:vertical;min-height:56px;font-size:14px;}
input:focus,select:focus,textarea:focus{border-color:var(--accent);}
select option{background:var(--surface2);}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.mact{display:flex;gap:7px;margin-top:18px;}
.mbtn-c{flex:1;padding:12px;background:var(--surface2);border:1px solid var(--border);border-radius:11px;color:var(--text);font-size:14px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.mbtn-s{flex:2;padding:12px;border:none;border-radius:11px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif;}
.mbtn-s.yellow{background:var(--accent);color:#000;}
.mbtn-s.purple{background:var(--occasional);color:#000;}
.mbtn-s.green{background:var(--accent2);color:#000;}

.ti{display:flex;align-items:center;gap:6px;}
.ti input{text-align:center;font-family:'Syne',sans-serif;font-weight:700;font-size:18px;padding:10px 6px;width:58px;}
.tsep{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;color:var(--accent);}

.cprow{display:grid;grid-template-columns:1fr 1.5fr;gap:9px;align-items:start;}
.cpst{font-size:10px;color:var(--muted);margin-top:3px;min-height:14px;}

.acw{position:relative;}
.acl{position:absolute;top:100%;left:0;right:0;background:var(--surface);border:1px solid var(--accent);border-radius:10px;z-index:500;max-height:200px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,.5);margin-top:3px;display:none;}
.acl.open{display:block;}
.aci{padding:10px 13px;cursor:pointer;border-bottom:1px solid var(--border);}
.aci:last-child{border-bottom:none;}
.aci:hover{background:rgba(240,165,0,.1);}
.aci-name{font-weight:600;font-size:13px;}
.aci-detail{font-size:11px;color:var(--muted);}

.dep-item{display:flex;align-items:center;gap:9px;padding:11px 0;border-bottom:1px solid var(--border);}
.dep-item:last-child{border-bottom:none;}
.dep-cb{width:20px;height:20px;accent-color:var(--accent);cursor:pointer;flex-shrink:0;}
.dep-lbl{flex:1;font-size:13px;}
.dep-th,.dep-tm{width:44px!important;padding:5px 3px!important;font-size:13px!important;text-align:center;flex-shrink:0;}
.sdiv{margin:14px 0 11px;padding-top:13px;border-top:1px solid var(--border);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);}

.spin{display:inline-block;width:12px;height:12px;border:2px solid rgba(240,165,0,.3);border-top-color:var(--accent);border-radius:50%;animation:sp .7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}

@media(min-width:700px){
  .overlay{align-items:center;padding:16px;}
  .modal{border-radius:18px;padding:22px;}
  .mhandle{display:none;}
}
</style>
</head>
<body>
<header>
  <div class="bus-icon">🚌</div>
  <div class="header-info">
    <h1>Transport Scolaire</h1>
    <p>ETS85-AIZ-C05</p>
  </div>
  <div class="save-indicator" id="saveInd">✓ Sauvegardé</div>
</header>

<div class="week-nav" id="weekNav"></div>

<div class="container">
  <div id="routingStatus"></div>
  <div class="stats-bar" id="statsBar"></div>

  <div class="sec-header">
    <span class="badge badge-m">☀️ MATIN</span>
    <div class="btn-group">
      <button class="btn btn-green" onclick="recalc('morning')">🗺 Recalc.</button>
      <button class="btn btn-blue" onclick="openDepotModal('morning')">📍 Dépôts</button>
      <button class="btn btn-primary" onclick="openPassModal('morning')">+ Passager</button>
    </div>
  </div>
  <div class="route-block">
    <div class="route-meta" id="morningMeta"></div>
    <div class="cards" id="morningBody"></div>
    <div class="dur" id="morningDur"></div>
  </div>

  <div class="sec-header">
    <span class="badge badge-e">🌙 SOIR</span>
    <div class="btn-group">
      <button class="btn btn-green" onclick="recalc('evening')">🗺 Recalc.</button>
      <button class="btn btn-blue" onclick="openDepotModal('evening')">📍 Dépôts</button>
      <button class="btn btn-primary" onclick="openPassModal('evening')">+ Passager</button>
    </div>
  </div>
  <div class="route-block">
    <div class="route-meta" id="eveningMeta"></div>
    <div class="cards" id="eveningBody"></div>
    <div class="dur" id="eveningDur"></div>
  </div>

  <div class="sec-header">
    <span class="badge badge-o">⚡ OCCASIONNEL</span>
    <div class="btn-group">
      <button class="btn btn-red" id="btnResetOcc" style="display:none" onclick="resetOcc()">🗑 Effacer</button>
      <button class="btn btn-green" id="btnRecalcOcc" style="display:none" onclick="recalc('occasional')">🗺 Recalc.</button>
      <button class="btn btn-blue" id="btnDepotOcc" style="display:none" onclick="openDepotModal('occasional')">📍 Dépôts</button>
      <button class="btn btn-purple" onclick="openPassModal('occasional')">+ Passager</button>
    </div>
  </div>
  <div class="occ-info">⚡ Circuit ponctuel — spécifique à ce jour</div>
  <div class="route-block occ-block" id="occBlock" style="display:none">
    <div class="route-meta" id="occasionalMeta"></div>
    <div class="cards" id="occasionalBody"></div>
    <div class="dur" id="occasionalDur"></div>
  </div>
</div>

<!-- MODAL PASSAGER -->
<div class="overlay" id="modalPass">
  <div class="modal">
    <div class="mhandle"></div>
    <h2 id="mPassTitle">➕ Nouveau passager</h2>
    <div class="fg">
      <label>🔍 Rechercher dans le carnet</label>
      <div class="acw">
        <input type="text" id="pSearch" placeholder="Taper un nom…" autocomplete="off" oninput="searchCarnet(this.value)">
        <div class="acl" id="pSearchList"></div>
      </div>
    </div>
    <div class="frow">
      <div class="fg"><label>Nom</label><input type="text" id="pNom" placeholder="DUPONT" autocomplete="off"></div>
      <div class="fg"><label>Prénom</label><input type="text" id="pPrenom" placeholder="Lucas" autocomplete="off"></div>
    </div>
    <div class="fg"><label>Adresse</label>
      <div class="acw">
        <input type="text" id="pAdresse" placeholder="12 rue des Lilas" autocomplete="off" oninput="searchAddr(this.value)">
        <div class="acl" id="pAdresseList"></div>
      </div>
    </div>
    <div class="cprow">
      <div class="fg">
        <label>Code postal</label>
        <input type="text" id="pCP" placeholder="85190" maxlength="5" inputmode="numeric" oninput="autoCP(this.value,'pVille','pCPSt','pVilleList')">
        <div class="cpst" id="pCPSt"></div>
      </div>
      <div class="fg"><label>Ville</label>
        <div class="acw">
          <input type="text" id="pVille" placeholder="Rempli auto…" autocomplete="off" oninput="searchVille(this.value,'pVilleList')">
          <div class="acl" id="pVilleList"></div>
        </div>
      </div>
    </div>
    <div class="fg"><label>Note</label><textarea id="pNote" placeholder="Portail bleu..."></textarea></div>
    <div class="frow">
      <div class="fg"><label>Lien</label><select id="pLien"><option>Mère</option><option>Père</option><option>Mobile</option><option>Tuteur</option></select></div>
      <div class="fg"><label>Téléphone</label><input type="tel" id="pTel" placeholder="06 XX XX XX XX"></div>
    </div>
    <div class="frow">
      <div class="fg"><label>Type</label><select id="pType"><option value="Montée">Montée</option><option value="Descente">Descente</option></select></div>
      <div class="fg"><label>Heure</label>
        <div class="ti">
          <input type="text" id="pH" placeholder="07" maxlength="2" inputmode="numeric">
          <span class="tsep">:</span>
          <input type="text" id="pMin" placeholder="00" maxlength="2" inputmode="numeric">
        </div>
      </div>
    </div>
    <div class="mact">
      <button class="mbtn-c" onclick="closePassModal()">Annuler</button>
      <button class="mbtn-s yellow" id="mPassSave" onclick="savePass()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- MODAL DÉPÔTS -->
<div class="overlay" id="modalDepots">
  <div class="modal">
    <div class="mhandle"></div>
    <h2 id="mDepotTitle">📍 Dépôts</h2>
    <p style="font-size:12px;color:var(--muted);margin-bottom:12px">Cochez les dépôts actifs ce jour.</p>
    <div id="depotsList"></div>
    <div class="sdiv">Ajouter un établissement</div>
    <div class="frow">
      <div class="fg"><label>Nom</label><input type="text" id="dNom" placeholder="Lycée Colette"></div>
      <div class="fg"><label>Heure</label>
        <div class="ti">
          <input type="text" id="dH" placeholder="08" maxlength="2" inputmode="numeric">
          <span class="tsep">:</span>
          <input type="text" id="dMin" placeholder="35" maxlength="2" inputmode="numeric">
        </div>
      </div>
    </div>
    <div class="fg"><label>Adresse (opt.)</label><input type="text" id="dAdresse" placeholder="Aizenay"></div>
    <button class="btn btn-primary" style="width:100%;justify-content:center;padding:12px;font-size:13px;margin-top:4px" onclick="addDepot()">+ Ajouter</button>
    <div class="mact"><button class="mbtn-c" onclick="closeDepotModal()">Fermer</button></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════
// CONSTANTES
// ══════════════════════════════════════════════════
const ORS_KEY = 'eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6ImI4MWRkNjZhYzMxODRjZDI5NjVlNmUwMTcwZmY2NzVmIiwiaCI6Im11cm11cjY0In0=';
const JOURS_C = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
const MOIS = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];

// ══════════════════════════════════════════════════
// UTILS TEMPS
// ══════════════════════════════════════════════════
const pad2 = n => String(n).padStart(2, '0');
const t2m = t => { if (!t || !t.includes(':')) return 0; const [h, m] = t.split(':').map(Number); return h * 60 + (isNaN(m) ? 0 : m); };
const m2t = m => `${pad2(Math.floor(m / 60) % 24)}:${pad2(m % 60)}`;
function parseHM(h, m) { const hh = parseInt(h) || 0, mm = parseInt(m) || 0; if (hh < 0 || hh > 23 || mm < 0 || mm > 59) return null; return `${pad2(hh)}:${pad2(mm)}`; }
function splitT(t) { if (!t || !t.includes(':')) return { h: '00', m: '00' }; const [h, m] = t.split(':'); return { h: h || '00', m: m || '00' }; }

function setupTF(hId, mId) {
  const h = document.getElementById(hId), m = document.getElementById(mId);
  if (!h || !m) return;
  h.addEventListener('input', function () { this.value = this.value.replace(/\D/g, ''); if (this.value.length === 2) m.focus(); });
  m.addEventListener('input', function () { this.value = this.value.replace(/\D/g, ''); });
}
setupTF('pH', 'pMin'); setupTF('dH', 'dMin');

// ══════════════════════════════════════════════════
// DONNÉES PAR DÉFAUT
// ══════════════════════════════════════════════════
const DEFAULT_BASE = {
  morning: {
    depart: "06:38", arrivee: "09:03", departCircuit: null,
    departAdresse: "", departCP: "85190", departVille: "Aizenay",
    passengers: [
      { id: 1, time: "06:55", type: "Montée",   nom: "TOGBA",    prenom: "Kimi Sun",  adresse: "Route de la Forêt",       cp: "85190", ville: "Aizenay",  note: "", lien: "Père",   tel: "06-46-85-XX-XX" },
      { id: 2, time: "07:13", type: "Montée",   nom: "BURGAUD",  prenom: "Jimmy",     adresse: "Les Brosses",              cp: "85190", ville: "Aizenay",  note: "", lien: "Mère",   tel: "06-07-21-XX-XX" },

let base, days, carnet = [];

function getTodayStr() { return new Date().toISOString().split('T')[0]; }

function loadData() {
  try { base = JSON.parse(localStorage.getItem('tb_base') || 'null') || JSON.parse(JSON.stringify(DEFAULT_BASE)); } catch (e) { base = JSON.parse(JSON.stringify(DEFAULT_BASE)); }
  try { days = JSON.parse(localStorage.getItem('tb_days') || '{}'); } catch (e) { days = {}; }
  try { carnet = JSON.parse(localStorage.getItem('tb_carnet') || '[]'); } catch (e) { carnet = []; }
  // Migration champ cp → cp
  ['morning','evening'].forEach(t => base[t].passengers.forEach(p => { if (p.codePostal && !p.cp) { p.cp = p.codePostal; delete p.codePostal; } }));
  if (!base.evening.departCircuit) base.evening.departCircuit = "16:30";
  initCarnet();
}

function saveData() {
  try {
    localStorage.setItem('tb_base', JSON.stringify(base));
    localStorage.setItem('tb_days', JSON.stringify(days));
    localStorage.setItem('tb_carnet', JSON.stringify(carnet));
    const ind = document.getElementById('saveInd');
    ind.textContent = '✓ Sauvegardé'; ind.style.color = 'var(--accent2)';
  } catch (e) { document.getElementById('saveInd').textContent = '⚠ Erreur'; }
}

// Données du jour (overrides)
function getDayOv(dateStr, tournee) {
  if (!days[dateStr] || !days[dateStr][tournee]) return null;
  return days[dateStr][tournee];
}

function ensureOv(dateStr, tournee) {
  if (!days[dateStr]) days[dateStr] = {};
  if (!days[dateStr][tournee]) {
    const b = base[tournee];
    days[dateStr][tournee] = {
      depart: b.depart, arrivee: b.arrivee, departCircuit: b.departCircuit || null,
      departAdresse: b.departAdresse, departCP: b.departCP, departVille: b.departVille,
      absents: [], extras: [], overrides: {}, depotsState: {}, timeShift: 0
    };
  }
  return days[dateStr][tournee];
}

function ensureOcc(dateStr) {
  if (!days[dateStr]) days[dateStr] = {};
  if (!days[dateStr].occasional) days[dateStr].occasional = JSON.parse(JSON.stringify(DEFAULT_OCC));
  return days[dateStr].occasional;
}

function getEff(dateStr, tournee) {
  const b = base[tournee];
  const ov = getDayOv(dateStr, tournee);
  const overrides = ov ? (ov.overrides || {}) : {};
  const depotsState = ov ? (ov.depotsState || {}) : {};
  // Décalage horaire du jour (ne modifie pas la base)
  // Shift = écart entre le départ du jour et le départ de base
  const dayDepart = ov ? (ov.depart || b.depart) : b.depart;
  const shift = t2m(dayDepart) - t2m(b.depart);

  return {
    depart: ov ? ov.depart : b.depart,
    arrivee: ov ? ov.arrivee : b.arrivee,
    departCircuit: ov ? (ov.departCircuit !== undefined ? ov.departCircuit : (shift ? m2t(t2m(b.departCircuit) + shift) : b.departCircuit)) : b.departCircuit,
    departAdresse: ov ? ov.departAdresse : b.departAdresse,
    departCP: ov ? ov.departCP : b.departCP,
    departVille: ov ? ov.departVille : b.departVille,
    passengers: b.passengers.map(p => {
      const base_time = shift ? m2t(t2m(p.time) + shift) : p.time;
      const shifted = { ...p, time: base_time };
      return overrides[p.id] ? { ...shifted, ...overrides[p.id], id: p.id, time: overrides[p.id].time || base_time } : shifted;
    }).sort((a, b) => t2m(a.time) - t2m(b.time)),
    absents: ov ? (ov.absents || []) : [],
    extras: ov ? (ov.extras || []) : [],
    depots: b.depots.map(d => ({
      ...d,
      time: shift ? m2t(t2m(d.time) + shift) : d.time,
      active: depotsState[d.id] !== undefined ? depotsState[d.id] : d.active
    }))
  };
}

// CARNET
// ══════════════════════════════════════════════════
function norm(s) { return (s || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/\s+/g, ''); }

function initCarnet() {
  if (carnet.length > 0) return;
  ['morning', 'evening'].forEach(t => base[t].passengers.forEach(p => upsertCarnet(p)));
}

function upsertCarnet(p) {
  const key = norm(p.nom + p.prenom);
  const idx = carnet.findIndex(c => norm(c.nom + c.prenom) === key);
  const e = { nom: p.nom, prenom: p.prenom, adresse: p.adresse, cp: p.cp || p.codePostal || '', ville: p.ville, lien: p.lien, tel: p.tel, note: p.note || '' };
  if (idx >= 0) carnet[idx] = e; else carnet.push(e);
}

function searchCarnet(val) {
  const list = document.getElementById('pSearchList');
  if (!val || val.length < 2) { list.classList.remove('open'); return; }
  const q = norm(val);
  const res = carnet.filter(c => norm(c.nom + c.prenom).includes(q) || norm(c.nom).startsWith(q) || norm(c.prenom).startsWith(q)).slice(0, 6);
  if (!res.length) { list.classList.remove('open'); return; }
  list.innerHTML = res.map((c, i) => `<div class="aci" onclick="fillCarnet(${i})"><div class="aci-name">${c.nom} ${c.prenom}</div><div class="aci-detail">${[c.adresse, c.cp, c.ville].filter(Boolean).join(', ')} · ${c.lien}: ${c.tel}</div></div>`).join('');
  list._res = res; list.classList.add('open');
}

function fillCarnet(idx) {
  const c = document.getElementById('pSearchList')._res[idx]; if (!c) return;
  document.getElementById('pNom').value = c.nom;
  document.getElementById('pPrenom').value = c.prenom;
  document.getElementById('pAdresse').value = c.adresse || '';
  document.getElementById('pCP').value = c.cp || '';
  document.getElementById('pVille').value = c.ville || '';
  document.getElementById('pNote').value = c.note || '';
  document.getElementById('pLien').value = c.lien || 'Mère';
  document.getElementById('pTel').value = c.tel || '';
  document.getElementById('pSearch').value = `${c.nom} ${c.prenom}`;
  document.getElementById('pSearchList').classList.remove('open');
  if (c.cp) { document.getElementById('pCPSt').textContent = '✓ ' + c.ville; document.getElementById('pCPSt').style.color = 'var(--accent2)'; }
}

function searchAddr(val) {
  const list = document.getElementById('pAdresseList');
  if (!val || val.length < 3) { list.classList.remove('open'); return; }
  const q = norm(val);
  const addrs = [...new Set(carnet.map(c => c.adresse).filter(Boolean))].filter(a => norm(a).includes(q)).slice(0, 5);
  if (!addrs.length) { list.classList.remove('open'); return; }
  list.innerHTML = addrs.map(a => `<div class="aci" onclick="pickAddr('${a.replace(/'/g, "\\'")}')"><div class="aci-name">${a}</div></div>`).join('');
  list.classList.add('open');
}

function pickAddr(addr) {
  document.getElementById('pAdresse').value = addr;
  document.getElementById('pAdresseList').classList.remove('open');
  const m = carnet.find(c => c.adresse === addr);
  if (m && m.cp) {
    document.getElementById('pCP').value = m.cp;
    document.getElementById('pVille').value = m.ville || '';
    document.getElementById('pCPSt').textContent = '✓ ' + m.ville;
    document.getElementById('pCPSt').style.color = 'var(--accent2)';
  }
}

function searchVille(val, listId) {
  const list = document.getElementById(listId);
  if (!val || val.length < 2) { list.classList.remove('open'); return; }
  const q = norm(val);
  const villes = [...new Set(carnet.map(c => c.ville).filter(Boolean))].filter(v => norm(v).includes(q)).slice(0, 5);
  if (!villes.length) { list.classList.remove('open'); return; }
  list.innerHTML = villes.map(v => `<div class="aci" onclick="document.getElementById('pVille').value='${v.replace(/'/g, "\\'")}';document.getElementById('${listId}').classList.remove('open')"><div class="aci-name">${v}</div></div>`).join('');
  list.classList.add('open');
}

// AUTO CP → VILLE
// ══════════════════════════════════════════════════
const cpCache = {}; let cpTimer = null;
async function autoCP(cp, villeId, statusId, listId) {
  const status = document.getElementById(statusId), villeEl = document.getElementById(villeId);
  const acList = listId ? document.getElementById(listId) : null;
  cp = cp.replace(/\D/g, '');
  if (cp.length < 5) { status.textContent = ''; if (acList) acList.classList.remove('open'); return; }
  if (cpCache[cp]) { showCPResult(cpCache[cp], villeEl, acList, status); return; }
  status.textContent = '⏳ Recherche…';
  clearTimeout(cpTimer);
  cpTimer = setTimeout(async () => {
    try {
      const res = await fetch(`https://geo.api.gouv.fr/communes?codePostal=${cp}&fields=nom&limit=20`);
      const json = await res.json();
      if (json && json.length > 0) { cpCache[cp] = json.map(c => c.nom); showCPResult(cpCache[cp], villeEl, acList, status); }
      else { status.textContent = 'Inconnu'; status.style.color = 'var(--danger)'; }
    } catch (e) { status.textContent = 'Hors ligne'; status.style.color = 'var(--muted)'; }
  }, 400);
}

function showCPResult(villes, villeEl, acList, status) {
  if (villes.length === 1) {
    villeEl.value = villes[0]; status.textContent = '✓ ' + villes[0]; status.style.color = 'var(--accent2)';
    if (acList) acList.classList.remove('open');
  } else {
    status.textContent = villes.length + ' communes ↓'; status.style.color = 'var(--accent)';
    if (acList) {
      acList.innerHTML = villes.map(v => `<div class="aci" onclick="pickCP('${v.replace(/'/g, "\\'")}',this)"><div class="aci-name">${v}</div></div>`).join('');
      acList._ve = villeEl; acList._st = status; acList.classList.add('open');
    }
  }
}

function pickCP(v, el) {
  const list = el.closest('.acl');
  if (list._ve) list._ve.value = v;
  if (list._st) { list._st.textContent = '✓ ' + v; list._st.style.color = 'var(--accent2)'; }
  list.classList.remove('open');
}

function getWeekDates() {
  const d = new Date(selDate + 'T12:00:00');
  const day = d.getDay();
  const mon = new Date(d);
  mon.setDate(d.getDate() - (day === 0 ? 6 : day - 1));
  const dates = [];
  for (let i = 0; i < 7; i++) { const dd = new Date(mon); dd.setDate(mon.getDate() + i); dates.push(dd.toISOString().split('T')[0]); }
  return dates;
}

function renderWeekNav() {
  const nav = document.getElementById('weekNav');
  const today = getTodayStr();
  const dates = getWeekDates();
  nav.innerHTML = '';

  const prev = document.createElement('button'); prev.className = 'nav-arrow'; prev.textContent = '‹';
  prev.onclick = () => { const d = new Date(selDate + 'T12:00:00'); d.setDate(d.getDate() - 7); selDate = d.toISOString().split('T')[0]; renderWeekNav(); render(); };
  nav.appendChild(prev);

  dates.forEach(ds => {
    const d = new Date(ds + 'T12:00:00');
    const isWE = d.getDay() === 0 || d.getDay() === 6;
    const btn = document.createElement('button');
    btn.className = 'day-btn' + (ds === today ? ' today' : '') + (ds === selDate ? ' active' : '') + (isWE ? ' weekend' : '');
    btn.innerHTML = `<span class="dn">${JOURS_C[d.getDay()]}</span><span class="dd">${d.getDate()}</span>`;
    const dv = days[ds];
    if (dv) {
      const hasMod = (dv.morning && ((dv.morning.absents || []).length || (dv.morning.extras || []).length)) ||
                     (dv.evening && ((dv.evening.absents || []).length || (dv.evening.extras || []).length)) ||
                     (dv.occasional && dv.occasional.passengers.length);
      if (hasMod) btn.classList.add('has-mod');
    }
    btn.onclick = () => { selDate = ds; renderWeekNav(); render(); };
    nav.appendChild(btn);
  });

  const next = document.createElement('button'); next.className = 'nav-arrow'; next.textContent = '›';
  next.onclick = () => { const d = new Date(selDate + 'T12:00:00'); d.setDate(d.getDate() + 7); selDate = d.toISOString().split('T')[0]; renderWeekNav(); render(); };
  nav.appendChild(next);
}

function render() { renderTournee('morning'); renderTournee('evening'); renderOcc(); renderStats(); }

function renderTournee(t) {
  const eff = getEff(selDate, t);
  const cls = t === 'morning' ? 'ct-m' : 'ct-e';
  const body = document.getElementById(t + 'Body');
  const meta = document.getElementById(t + 'Meta');
  const dur = document.getElementById(t + 'Dur');
  const activeDepots = eff.depots.filter(d => d.active).sort((a, b) => t2m(a.time) - t2m(b.time));
  const { h: dH, m: dM } = splitT(eff.depart);
  const { h: aH, m: aM } = splitT(eff.arrivee || '');

  meta.innerHTML = `
    <span>🏠 <input class="te" type="text" value="${dH}" maxlength="2" inputmode="numeric" id="${t}DH" onchange="onDepart('${t}','h',this.value)"><b style="color:var(--accent)">:</b><input class="te" type="text" value="${dM}" maxlength="2" inputmode="numeric" id="${t}DM" onchange="onDepart('${t}','m',this.value)"></span>
    ${eff.arrivee ? `<span>🏁 <input class="te" type="text" value="${aH}" maxlength="2" inputmode="numeric" onchange="onArrivee('${t}','h',this.value)"><b style="color:var(--accent)">:</b><input class="te" type="text" value="${aM}" maxlength="2" inputmode="numeric" onchange="onArrivee('${t}','m',this.value)"></span>` : ''}
    <span>👥 <strong>${eff.passengers.length - eff.absents.length + eff.extras.length}</strong></span>
    <span>📍 <strong>${activeDepots.length}</strong></span>
    ${eff.absents.length ? `<span style="color:var(--danger)">❌ ${eff.absents.length}</span>` : ''}
    ${eff.extras.length ? `<span style="color:var(--accent2)">➕ ${eff.extras.length}</span>` : ''}`;

  body.innerHTML = '';

  // Carte départ
  const da = [eff.departAdresse, eff.departCP, eff.departVille].filter(Boolean).join(', ');
  body.appendChild(makeCard({ cls: 'ct-g', time: eff.depart, badge: '🏠 Domicile', badgeCls: 'tb-depart', name: da || 'Non renseigné', editBtn: `openDepartModal('${t}')` }));

  // Soir : dépôts de prise + carte départ circuit
  if (t === 'evening') {
    activeDepots.forEach(d => body.appendChild(makeDepotCard(d, 'Prise', t, cls)));
    if (eff.departCircuit) {
      body.appendChild(makeCard({ cls: 'ct-e', time: eff.departCircuit, badge: '🚌 Départ circuit', badgeCls: 'tb-depart', name: 'Début des descentes', editBtn: `openDCModal()` }));
    }
  }

  // Passagers de base
  eff.passengers.forEach(p => {
    const isAbs = eff.absents.includes(p.id);
    const div = document.createElement('div');
    div.className = 'card' + (isAbs ? ' absent-card' : '');
    const addr = [p.adresse, p.cp, p.ville].filter(Boolean).join(', ');
    div.innerHTML = `
      <div class="ct ${cls}">${p.time}</div>
      <div class="cb">
        <div class="ctop">
          <span class="tbadge ${p.type === 'Montée' ? 'tb-up' : 'tb-down'}">${p.type === 'Montée' ? '⬆' : '⬇'} ${p.type}</span>
          ${isAbs ? '<span class="tbadge tb-absent">❌ Absent</span>' : ''}
          <span class="cname">${p.nom} ${p.prenom}</span>
        </div>
        <div class="caddr">${addr || '—'}</div>
        ${p.note ? `<div class="cnote">💬 ${p.note}</div>` : ''}
        <div class="ctel">${p.lien}: ${p.tel}</div>
      </div>
      <div class="cact">
        <button class="ib" onclick="openEditBasePass('${t}',${p.id})">✏️</button>
        ${isAbs
          ? `<button class="ib restore" onclick="toggleAbsent('${t}',${p.id})">↩️</button>`
          : `<button class="ib del" onclick="toggleAbsent('${t}',${p.id})">❌</button>`}
        <button class="ib del" onclick="deleteBasePass('${t}',${p.id})">🗑</button>
      </div>`;
    body.appendChild(div);
  });

  // Extras du jour
  eff.extras.forEach(p => {
    const div = document.createElement('div');
    div.className = 'card extra-card';
    const addr = [p.adresse, p.cp, p.ville].filter(Boolean).join(', ');
    div.innerHTML = `
      <div class="ct ${cls}">${p.time}</div>
      <div class="cb">
        <div class="ctop">
          <span class="tbadge tb-extra">➕ Extra</span>
          <span class="tbadge ${p.type === 'Montée' ? 'tb-up' : 'tb-down'}">${p.type === 'Montée' ? '⬆' : '⬇'} ${p.type}</span>
          <span class="cname">${p.nom} ${p.prenom}</span>
        </div>
        <div class="caddr">${addr || '—'}</div>
        ${p.note ? `<div class="cnote">💬 ${p.note}</div>` : ''}
        <div class="ctel">${p.lien}: ${p.tel}</div>
      </div>
      <div class="cact">
        <button class="ib" onclick="openEditExtra('${t}',${p.id})">✏️</button>
        <button class="ib del" onclick="deleteExtra('${t}',${p.id})">✕</button>
      </div>`;
    body.appendChild(div);
  });

  // Matin : dépôts
  if (t === 'morning') activeDepots.forEach(d => body.appendChild(makeDepotCard(d, 'Dépôt', t, cls)));

  const actifs = [...eff.passengers.filter(p => !eff.absents.includes(p.id)), ...eff.extras];
  if (actifs.length === 0) { const e = document.createElement('div'); e.className = 'empty'; e.textContent = 'Aucun passager'; body.appendChild(e); }

  if (actifs.length > 0) {
    const times = actifs.map(p => t2m(p.time));
    const first = Math.min(...times), last = Math.max(...times);
    dur.innerHTML = `<span>Durée ~<strong>${last - t2m(eff.depart) + 20} min</strong></span><span>1er→dernier: <strong>${last - first} min</strong></span>`;
  } else dur.innerHTML = '';
}

function makeCard({ cls, time, badge, badgeCls, name, addr, editBtn }) {
  const div = document.createElement('div');
  div.className = 'card depart-card';
  div.innerHTML = `
    <div class="ct ${cls}">${time}</div>
    <div class="cb">
      <div class="ctop"><span class="tbadge ${badgeCls}">${badge}</span></div>
      <div class="caddr">${name}</div>
      ${addr ? `<div class="caddr">${addr}</div>` : ''}
    </div>
    <div class="cact"><button class="ib" onclick="${editBtn}">✏️</button></div>`;
  return div;
}

// ══════════════════════════════════════════════════
// HORAIRES — DÉCALAGE
// ══════════════════════════════════════════════════
function onDepart(tournee, part, val) {
  let ov;
  if (tournee === 'occasional') { ov = ensureOcc(selDate); }
  else { ov = ensureOv(selDate, tournee); }

  // Lire les deux champs H et M depuis le DOM
  const hEl = document.getElementById(tournee + 'DH');
  const mEl = document.getElementById(tournee + 'DM');
  const hVal = part === 'h' ? val : (hEl ? hEl.value : splitT(ov.depart || '00:00').h);
  const mVal = part === 'm' ? val : (mEl ? mEl.value : splitT(ov.depart || '00:00').m);
  const newT = parseHM(hVal, mVal);
  if (!newT) return;

  if (tournee === 'occasional') {
    const oldDepart = ov.depart || '00:00';
    const diff = t2m(newT) - t2m(oldDepart);
    ov.depart = newT;
    if (diff === 0) { saveData(); render(); return; }
    ov.passengers.forEach(p => { p.time = m2t(t2m(p.time) + diff); });
    ov.passengers.sort((a, b) => t2m(a.time) - t2m(b.time));
    ov.depots.forEach(d => { d.time = m2t(t2m(d.time) + diff); });
  } else {
    // Nouveau décalage par rapport à la BASE originale (jamais modifiée)
    const baseDepart = t2m(base[tournee].depart);
    const newDepart = t2m(newT);
    const newShift = newDepart - baseDepart;
    const oldShift = ov.timeShift || 0;
    const diffExtras = newShift - oldShift;

    ov.depart = newT;
    ov.timeShift = newShift;

    // Décaler les extras du jour par rapport à leur position actuelle
    ov.extras.forEach(p => { p.time = m2t(t2m(p.time) + diffExtras); });
    ov.extras.sort((a, b) => t2m(a.time) - t2m(b.time));

    // Arrivée et départ circuit
    if (base[tournee].arrivee) ov.arrivee = m2t(t2m(base[tournee].arrivee) + newShift);
    if (base[tournee].departCircuit) ov.departCircuit = m2t(t2m(base[tournee].departCircuit) + newShift);
  }
  saveData(); render();
}

function onArrivee(t, part, val) {
  const ov = ensureOv(selDate, t);
  const cur = ov.arrivee || base[t].arrivee || '09:00';
  const { h, m } = splitT(cur);
  const newT = part === 'h' ? parseHM(val, m) : parseHM(h, val);
  if (newT) { ov.arrivee = newT; saveData(); render(); }
}

function toggleAbsent(t, id) {
  const ov = ensureOv(selDate, t);
  const idx = ov.absents.indexOf(id);
  if (idx >= 0) ov.absents.splice(idx, 1); else ov.absents.push(id);
  saveData(); render(); renderWeekNav();
}

function deleteBasePass(t, id) {
  if (!confirm('Supprimer définitivement pour tous les jours ?')) return;
  base[t].passengers = base[t].passengers.filter(p => p.id !== id);
  saveData(); render(); renderWeekNav();
}

function deleteExtra(t, id) {
  if (t === 'occasional') { const occ = days[selDate] && days[selDate].occasional; if (occ) occ.passengers = occ.passengers.filter(p => p.id !== id); }
  else { const ov = ensureOv(selDate, t); ov.extras = ov.extras.filter(p => p.id !== id); }
  saveData(); render(); renderWeekNav();
}

function resetOcc() {
  if (!confirm('Effacer le circuit occasionnel de ce jour ?')) return;
  if (days[selDate]) delete days[selDate].occasional;
  saveData(); render(); renderWeekNav();
}

function openPassModal(tournee, id = null, isBase = false) {
  curTournee = tournee; editPassId = id; editBasePassId = isBase ? id : null;
  const isOcc = tournee === 'occasional';
  document.getElementById('mPassTitle').textContent = id ? '✏️ Modifier' : '➕ Nouveau passager' + (isOcc ? ' (⚡)' : '');
  document.getElementById('mPassSave').className = 'mbtn-s ' + (isOcc ? 'purple' : 'yellow');
  document.getElementById('pCPSt').textContent = '';
  document.getElementById('pSearch').value = '';
  document.getElementById('pSearchList').classList.remove('open');

  let p = null;
  if (id && isBase) p = base[tournee].passengers.find(x => x.id === id);
  else if (id && !isBase && tournee === 'occasional') { const occ = days[selDate] && days[selDate].occasional; p = occ && occ.passengers.find(x => x.id === id); }
  else if (id) { const ov = days[selDate] && days[selDate][tournee]; p = ov && ov.extras.find(x => x.id === id); }

  if (p) {
    document.getElementById('pNom').value = p.nom || '';
    document.getElementById('pPrenom').value = p.prenom || '';
    document.getElementById('pAdresse').value = p.adresse || '';
    document.getElementById('pCP').value = p.cp || p.codePostal || '';
    document.getElementById('pVille').value = p.ville || '';
    document.getElementById('pNote').value = p.note || '';
    document.getElementById('pLien').value = p.lien || 'Mère';
    document.getElementById('pTel').value = p.tel || '';
    document.getElementById('pType').value = p.type || 'Montée';
    const { h, m } = splitT(p.time || '07:00');
    document.getElementById('pH').value = h; document.getElementById('pMin').value = m;
  } else {
    document.getElementById('pType').value = tournee === 'morning' ? 'Montée' : 'Descente';
    ['pNom', 'pPrenom', 'pAdresse', 'pCP', 'pVille', 'pNote', 'pTel'].forEach(i => document.getElementById(i).value = '');
    document.getElementById('pH').value = tournee === 'morning' ? '07' : tournee === 'evening' ? '17' : '08';
    document.getElementById('pMin').value = '00';
  }
  document.getElementById('modalPass').classList.add('open');
}

function openEditBasePass(t, id) { openPassModal(t, id, true); }
function openEditExtra(t, id) { openPassModal(t, id, false); }
function closePassModal() { document.getElementById('modalPass').classList.remove('open'); editPassId = null; editBasePassId = null; document.querySelectorAll('.acl').forEach(l => l.classList.remove('open')); }

function savePass() {
  const nom = document.getElementById('pNom').value.trim();
  if (!nom) { alert('Veuillez saisir un nom.'); return; }
  const heure = parseHM(document.getElementById('pH').value, document.getElementById('pMin').value);
  if (!heure) { alert('Heure invalide.'); return; }
  const obj = {
    nom: nom.toUpperCase(), prenom: document.getElementById('pPrenom').value.trim(),
    adresse: document.getElementById('pAdresse').value.trim(),
    cp: document.getElementById('pCP').value.trim(),
    ville: document.getElementById('pVille').value.trim(),
    note: document.getElementById('pNote').value.trim(),
    lien: document.getElementById('pLien').value,
    tel: document.getElementById('pTel').value.trim() || '—',
    type: document.getElementById('pType').value, time: heure
  };
  upsertCarnet(obj);

  if (editBasePassId) {
    // Modifier ce passager uniquement pour ce jour (override)
    const ov = ensureOv(selDate, curTournee);
    if (!ov.overrides) ov.overrides = {};
    ov.overrides[editBasePassId] = obj;
  } else if (curTournee === 'occasional') {
    const occ = ensureOcc(selDate);
    if (editPassId) Object.assign(occ.passengers.find(x => x.id === editPassId), obj);
    else occ.passengers.push({ id: nextId++, ...obj });
    occ.passengers.sort((a, b) => t2m(a.time) - t2m(b.time));
  } else {
    const ov = ensureOv(selDate, curTournee);
    if (editPassId) Object.assign(ov.extras.find(x => x.id === editPassId), obj);
    else { ov.extras.push({ id: nextId++, ...obj }); ov.extras.sort((a, b) => t2m(a.time) - t2m(b.time)); }
  }
  saveData(); render(); renderWeekNav(); closePassModal();
}

function deactivDepot(t, id) {
  if (t === 'occasional') { const occ = ensureOcc(selDate); const d = occ.depots.find(x => x.id === id); if (d) d.active = false; }
  else { const ov = ensureOv(selDate, t); if (!ov.depotsState) ov.depotsState = {}; ov.depotsState[id] = false; base[t].depots.find(x => x.id === id).active = false; }
  saveData(); render();
}

function openDepotModal(t) {
  editDepotTournee = t;
  const labels = { morning: 'Matin', evening: 'Soir', occasional: 'Occasionnel' };
  document.getElementById('mDepotTitle').textContent = `📍 Dépôts — ${labels[t]}`;
  renderDepotsList();
  document.getElementById('modalDepots').classList.add('open');
}

function closeDepotModal() { document.getElementById('modalDepots').classList.remove('open'); }

function getDepots() {
  if (editDepotTournee === 'occasional') return ensureOcc(selDate).depots;
  const ov = ensureOv(selDate, editDepotTournee);
  const st = ov.depotsState || {};
  return base[editDepotTournee].depots.map(d => ({ ...d, active: st[d.id] !== undefined ? st[d.id] : d.active }));
}

function renderDepotsList() {
  const depots = getDepots();
  const c = document.getElementById('depotsList');
  if (!depots.length) { c.innerHTML = '<p style="color:var(--muted);font-size:13px;padding:8px 0">Aucun dépôt.</p>'; return; }
  c.innerHTML = depots.map(d => {
    const { h, m } = splitT(d.time);
    return `<div class="dep-item">
      <input type="checkbox" class="dep-cb" ${d.active ? 'checked' : ''} onchange="setDepotActive(${d.id},this.checked)">
      <div class="dep-lbl" style="font-weight:${d.active ? 600 : 400};color:${d.active ? 'var(--text)' : 'var(--muted)'}">${d.nom}${d.adresse ? ` <span style="font-size:11px;color:var(--muted)">(${d.adresse})</span>` : ''}</div>
      <input type="text" class="dep-th" value="${h}" maxlength="2" inputmode="numeric" onchange="updateDepotTime(${d.id},'h',this.value)">
      <span style="color:var(--accent);font-weight:800">:</span>
      <input type="text" class="dep-tm" value="${m}" maxlength="2" inputmode="numeric" onchange="updateDepotTime(${d.id},'m',this.value)">
      <button class="ib del" onclick="removeDepot(${d.id})">🗑</button>
    </div>`;
  }).join('');
}

function setDepotActive(id, val) {
  if (editDepotTournee === 'occasional') { const d = ensureOcc(selDate).depots.find(x => x.id === id); if (d) d.active = val; }
  else { const ov = ensureOv(selDate, editDepotTournee); if (!ov.depotsState) ov.depotsState = {}; ov.depotsState[id] = val; const bd = base[editDepotTournee].depots.find(x => x.id === id); if (bd) bd.active = val; }
  saveData(); renderDepotsList(); render();
}

function updateDepotTime(id, part, val) {
  let d;
  if (editDepotTournee === 'occasional') d = ensureOcc(selDate).depots.find(x => x.id === id);
  else d = base[editDepotTournee].depots.find(x => x.id === id);
  if (!d) return;
  const { h, m } = splitT(d.time);
  const newT = part === 'h' ? parseHM(val, m) : parseHM(h, val);
  if (newT) { d.time = newT; saveData(); renderDepotsList(); render(); }
}

function removeDepot(id) {
  if (editDepotTournee === 'occasional') { const occ = ensureOcc(selDate); occ.depots = occ.depots.filter(x => x.id !== id); }
  else { base[editDepotTournee].depots = base[editDepotTournee].depots.filter(x => x.id !== id); }
  saveData(); renderDepotsList(); render();
}

function addDepot() {
  const nom = document.getElementById('dNom').value.trim(); if (!nom) { alert('Saisir le nom.'); return; }
  const heure = parseHM(document.getElementById('dH').value, document.getElementById('dMin').value) || '08:35';
  const depot = { id: nextId++, time: heure, nom, adresse: document.getElementById('dAdresse').value.trim(), active: true };
  if (editDepotTournee === 'occasional') ensureOcc(selDate).depots.push(depot);
  else base[editDepotTournee].depots.push(depot);
  document.getElementById('dNom').value = ''; document.getElementById('dAdresse').value = '';
  document.getElementById('dH').value = ''; document.getElementById('dMin').value = '';
  saveData(); renderDepotsList(); render();
}

function openEditDepot(t, id) {
  let d;
  if (t === 'occasional') d = (days[selDate] && days[selDate].occasional) ? days[selDate].occasional.depots.find(x => x.id === id) : null;
  else d = base[t].depots.find(x => x.id === id);
  if (!d) return;
  const { h, m } = splitT(d.time);
  showDynModal('modalEditDepot', `
    <h2>✏️ Modifier le dépôt</h2>
    <div class="fg"><label>Nom</label><input type="text" id="edN" value="${d.nom}"></div>
    <div class="fg"><label>Adresse</label><input type="text" id="edA" value="${d.adresse || ''}"></div>
    <div class="fg"><label>Heure</label><div class="ti"><input type="text" id="edH" value="${h}" maxlength="2" inputmode="numeric"><span class="tsep">:</span><input type="text" id="edM" value="${m}" maxlength="2" inputmode="numeric"></div></div>
    <div class="mact"><button class="mbtn-c" onclick="closeDyn('modalEditDepot')">Annuler</button><button class="mbtn-s yellow" onclick="saveEditDepot('${t}',${id})">Enregistrer</button></div>
  `);
  setupTF('edH', 'edM');
}

function saveEditDepot(t, id) {
  const nom = document.getElementById('edN').value.trim(); if (!nom) return;
  const heure = parseHM(document.getElementById('edH').value, document.getElementById('edM').value);
  if (!heure) { alert('Heure invalide'); return; }
  const adresse = document.getElementById('edA').value.trim();
  let d;
  if (t === 'occasional') d = (days[selDate] && days[selDate].occasional) ? days[selDate].occasional.depots.find(x => x.id === id) : null;
  else d = base[t].depots.find(x => x.id === id);
  if (d) { d.nom = nom; d.adresse = adresse; d.time = heure; }
  closeDyn('modalEditDepot');
  saveData(); render();

function showDynModal(id, html) {

  const wrap = document.createElement('div');
  wrap.className = 'overlay open'; wrap.id = id;
  wrap.innerHTML = `<div class="modal"><div class="mhandle"></div>${html}</div>`;
  wrap.addEventListener('click', e => { if (e.target === wrap) wrap.remove(); });
  document.body.appendChild(wrap);
}

function closeDyn(id) { const el = document.getElementById(id); if (el) el.remove(); }

// ORS ROUTING
// ══════════════════════════════════════════════════
function getAddr(p) { return `${p.adresse || ''} ${p.cp || ''} ${p.ville || ''}`.trim(); }

async function geocode(address) {
  try { const r = await fetch(`https://api.openrouteservice.org/geocode/search?api_key=${ORS_KEY}&text=${encodeURIComponent(address)}&boundary.country=FR&size=1`); const j = await r.json(); if (j.features && j.features[0]) return j.features[0].geometry.coordinates; } catch (e) {} return null;
}

async function routeDur(a, b) {
  try { const r = await fetch(`https://api.openrouteservice.org/v2/directions/driving-car?api_key=${ORS_KEY}&start=${a[0]},${a[1]}&end=${b[0]},${b[1]}`); const j = await r.json(); if (j.features && j.features[0]) return j.features[0].properties.segments[0].duration; } catch (e) {} return null;
}

function showRS(msg, type = '') { const el = document.getElementById('routingStatus'); if (!msg) { el.innerHTML = ''; return; } el.innerHTML = `<div class="rbanner ${type}">${msg}</div>`; }
const sleep = ms => new Promise(r => setTimeout(r, ms));

async function recalc(tournee) {
  let passengers, ov, depart;
  if (tournee === 'occasional') { const occ = ensureOcc(selDate); passengers = [...occ.passengers]; ov = occ; depart = occ.depart; }
  else { const eff = getEff(selDate, tournee); ov = ensureOv(selDate, tournee); passengers = [...eff.passengers.filter(p => !eff.absents.includes(p.id)), ...eff.extras]; depart = eff.depart; }
  if (!passengers.length) { showRS('Aucun passager actif.', 'error'); setTimeout(() => showRS(''), 3000); return; }
  showRS(`<span class="spin"></span> Recalcul en cours…`, 'loading');
  try {
    passengers.sort((a, b) => t2m(a.time) - t2m(b.time));
    const coords = [];
    for (const p of passengers) { coords.push(await geocode(getAddr(p))); await sleep(150); }
    const durs = [];
    for (let i = 0; i < coords.length - 1; i++) {
      if (coords[i] && coords[i + 1]) { const s = await routeDur(coords[i], coords[i + 1]); durs.push(s !== null ? Math.ceil(s / 60) + 2 : 8); await sleep(150); }
      else durs.push(8);
    }
    if (tournee === 'morning') {
      const ad = base.morning.depots.filter(d => d.active).sort((a, b) => t2m(a.time) - t2m(b.time));
      const dt = ad.length ? t2m(ad[0].time) : t2m("08:35");
      let cur = dt - 20 - durs.reduce((a, b) => a + b, 0);
      passengers.forEach((p, i) => { p.time = m2t(cur); if (i < durs.length) cur += durs[i]; });
      base.morning.arrivee = m2t((ad.length ? t2m(ad[ad.length - 1].time) : dt + 10) + 15);
    } else {
      const dc = ov.departCircuit || base[tournee].departCircuit || depart;
      let cur = t2m(dc) + 5;
      passengers.forEach((p, i) => { p.time = m2t(cur); if (i < durs.length) cur += durs[i]; });
    }
    // Réécrire les temps
    if (tournee === 'occasional') { passengers.forEach(p => { const o = ov.passengers.find(x => x.id === p.id); if (o) o.time = p.time; }); }
    else {
      passengers.forEach(p => {
        const bp = base[tournee].passengers.find(x => x.id === p.id);
        if (bp) bp.time = p.time;
        else { const ex = ov.extras.find(x => x.id === p.id); if (ex) ex.time = p.time; }
      });
    }
    saveData(); render();
    showRS(`✓ Recalculé — ${coords.filter(Boolean).length}/${passengers.length} adresses trouvées`, 'ok');
    setTimeout(() => showRS(''), 5000);
  } catch (e) { showRS('⚠ Erreur de calcul.', 'error'); saveData(); render(); }
}

renderWeekNav();
render();
</script>
